<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Magic Ai Lucky Jet Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
    body {
        background: black;
        color: #00bfff;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        padding: 15px;
    }

    h1 {
        font-family: 'UnifrakturCook', cursive;
        font-size: 30px;
        color: cyan;
        margin-bottom: 20px;
        text-shadow: 0 0 8px #00bfff, 0 0 15px #00ffff;
    }

    #balanceContainer {
        position: fixed;
        top: 10px;
        right: 15px;
        background: #111;
        padding: 5px 12px;
        border-radius: 20px;
        color: #00ffff;
        font-weight: bold;
        z-index: 9999;
    }

    /* 🔥 MODERN TOGGLE */
    .mode-toggle {
        display: flex;
        justify-content: center;
        background: #111;
        border-radius: 30px;
        padding: 4px;
        margin-bottom: 10px;
        width: 220px;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 0 10px #00bfff;
    }

    .mode-btn {
        flex: 1;
        padding: 8px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .mode-btn.active {
        background: #00bfff;
        color: black;
        font-weight: bold;
        box-shadow: 0 0 10px #00bfff;
    }

    #modeInfo {
        font-size: 13px;
        margin-bottom: 10px;
        color: #00ffff;
    }

    #botImage {
        width: 200px;
        height: 200px;
        border-radius: 20px;
        object-fit: cover;
        margin-bottom: 20px;
        border: 3px solid #00bfff;
        box-shadow: 0 0 20px #00bfff, 0 0 35px #00ffff;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% {box-shadow: 0 0 20px #00bfff, 0 0 35px #00ffff;}
        50% {box-shadow: 0 0 30px #00bfff, 0 0 50px #00ffff;}
    }

    #predictBtn {
        padding: 14px 20px;
        font-size: 18px;
        font-weight: 600;
        border-radius: 12px;
        border: none;
        background: #00bfff;
        color: black;
        cursor: pointer;
        margin-bottom: 20px;
        box-shadow: 0 0 18px #00bfff, 0 0 25px #00ffff;
        transition: 0.3s ease-in-out;
        position: relative;
        overflow: hidden;
    }

    #predictBtn:disabled {
        background: #005f7f;
        cursor: not-allowed;
        box-shadow: 0 0 10px #005f7f;
    }

    #predictionBox {
        background: linear-gradient(145deg, #000000, #001f2f);
        border: 2px solid #00bfff;
        border-radius: 16px;
        padding: 20px;
        color: #00ffff;
        font-size: 16px;
        text-align: left;
        white-space: pre-line;
        display: none;
        max-width: 400px;
        margin: 0 auto;
        box-shadow: 0 0 25px #00bfff, 0 0 40px #00ffff, 0 0 55px #00bfff inset;
    }

    #loadingText {
        color: #00bfff;
        font-size: 18px;
        margin-bottom: 20px;
        display: none;
        font-weight: 600;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50%, 100% {opacity: 1;}
        25%, 75% {opacity: 0.2;}
    }

    .rocket {
        position: absolute;
        font-size: 24px;
        animation: flyRocket 1.5s linear forwards;
    }

    @keyframes flyRocket {
        0% {top: 100%; left: 10%;}
        25% {top: 70%; left: 40%;}
        50% {top: 40%; left: 60%;}
        75% {top: 20%; left: 80%;}
        100% {top: 0%; left: 100%;}
    }

    .trail {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #00ffff;
        border-radius: 50%;
        opacity: 0.8;
        animation: trailAnim 1.5s linear forwards;
    }

    @keyframes trailAnim {
        0% {transform: translate(0, 0); opacity: 1;}
        100% {transform: translate(-50px, -100px); opacity: 0;}
    }

    #toast {
        visibility: hidden;
        min-width: 200px;
        background-color: #00bfff;
        color: black;
        text-align: center;
        border-radius: 8px;
        padding: 10px;
        position: fixed;
        bottom: 50px;
        z-index: 999;
        font-weight: bold;
    }

    #toast.show {
        visibility: visible;
        animation: fadein 0.5s, fadeout 0.5s 2s;
    }
</style>
</head>

<body>

<h1>Dark Magic Ai Lucky Jet Bot</h1>

<div id="balanceContainer">
    Balance: <span id="balanceAmount">0</span> COINS
</div>

<!-- ✅ ADDED -->
<div class="mode-toggle">
  <div class="mode-btn active" id="regularBtn">Regular</div>
  <div class="mode-btn" id="premiumBtn">Premium</div>
</div>
<div id="modeInfo">You are currently using Regular Prediction</div>

<img id="botImage" src="lucky.jpg">

<div id="loadingText">⏳ Predicting...</div>
<button id="predictBtn">🚀 Predict Lucky Jet</button>

<div id="predictionBox"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
function padZero(num){return num<10?'0'+num:num;}
function getRandomCoefficient(){return (Math.random()*(4.50-2.50)+2.50).toFixed(2);}
function getPremiumCoefficient(){return (Math.random()*(2.30-1.50)+1.50).toFixed(2);}
function getRandomMinuteOffset(){return Math.floor(Math.random()*2)+2;}

const predictBtn=document.getElementById("predictBtn");
const predictionBox=document.getElementById("predictionBox");
const loadingText=document.getElementById("loadingText");
const balanceDisplay=document.getElementById("balanceAmount");
const toast=document.getElementById("toast");

const regularBtn=document.getElementById("regularBtn");
const premiumBtn=document.getElementById("premiumBtn");
const modeInfo=document.getElementById("modeInfo");

let mode="regular";

regularBtn.onclick=()=>{
 mode="regular";
 regularBtn.classList.add("active");
 premiumBtn.classList.remove("active");
 modeInfo.innerText="You are currently using Regular Prediction";
};

premiumBtn.onclick=()=>{
 mode="premium";
 premiumBtn.classList.add("active");
 regularBtn.classList.remove("active");
 modeInfo.innerText="Premium Mode: costs 2 coins";
};

const firebaseConfig={
 apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
 authDomain:"bets-d795d.firebaseapp.com",
 projectId:"bets-d795d",
 storageBucket:"bets-d795d.appspot.com",
 messagingSenderId:"384386108287",
 appId:"1:384386108287:android:d238a5ec8068d9bb9be84a",
 databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentUserUid=null;

firebase.auth().onAuthStateChanged(user=>{
 if(!user){alert("Please login first");return;}
 currentUserUid=user.uid;

 db.ref("users/"+currentUserUid+"/balance").on("value",snap=>{
  balanceDisplay.innerText=snap.val()||0;
 });
});

function showToast(msg){
 toast.textContent=msg;
 toast.className="show";
 setTimeout(()=>toast.className="",2500);
}

predictBtn.addEventListener("click",()=>{
 if(!currentUserUid){showToast("Login first");return;}

 const cost=(mode==="premium")?2:1;

 const ref=db.ref("users/"+currentUserUid+"/balance");

 ref.transaction(current=>{
  current=current||0;
  if(current<cost){showToast("Insufficient balance!");return;}
  return current-cost;
 },(err,committed)=>{
  if(!committed)return;

  db.ref("users/"+currentUserUid+"/transactions").push({
   type:"bet",
   coins:-cost,
   game:"Lucky Jet",
   ref:"BET-"+Date.now(),
   time:Date.now(),
   uid:currentUserUid
  });

  predictBtn.disabled=true;
  predictionBox.style.display="none";
  loadingText.style.display="block";

  const rocket=document.createElement("div");
  rocket.classList.add("rocket");
  rocket.textContent="🚀";
  document.body.appendChild(rocket);

  for(let i=0;i<8;i++){
   const trail=document.createElement("div");
   trail.classList.add("trail");
   document.body.appendChild(trail);
   setTimeout(()=>trail.remove(),1500);
  }

  setTimeout(()=>{
   loadingText.style.display="none";
   rocket.remove();

   const now=new Date();
   const offset=getRandomMinuteOffset();
   const future=new Date(now.getTime()+offset*60000);

   const hour=padZero(future.getHours());
   const minute=padZero(future.getMinutes());

   const coef=parseFloat(mode==="premium"?getPremiumCoefficient():getRandomCoefficient());

   predictionBox.style.display="block";
   predictionBox.textContent=`LUCKY JET PREDICTION
┏━━━━━━━━━━━━━
┠ TIME : ${hour}:${minute}
┠ COEFFICIENT: `;

   let span=document.createElement("span");
   span.textContent="1.00X";
   predictionBox.appendChild(span);

   let step=0;
   let interval=setInterval(()=>{
    step++;
    let val=1+((coef-1)*(step/50));
    span.textContent=val.toFixed(2)+"X";
    if(step>=50)clearInterval(interval);
   },20);

   let end=document.createElement("div");
   end.textContent="┗━━━━━━━━━━━━━";
   predictionBox.appendChild(document.createElement("br"));
   predictionBox.appendChild(end);

   let check=setInterval(()=>{
    if(new Date()>=future){
     predictBtn.disabled=false;
     clearInterval(check);
    }
   },1000);

  },1500);
 });
});
</script>

</body>
</html>
