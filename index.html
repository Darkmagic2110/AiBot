<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Dark Magic AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #000000, #1a0000);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    width: 360px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255, 0, 0, 0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    border: 1px solid rgba(255,0,0,0.2);
    animation: fadeIn 0.8s ease;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    color: #ff1a1a;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,0,0,0.08);
    color: white;
    outline: none;
}

input::placeholder {
    color: #ff9999;
}

.checkbox {
    display: flex;
    align-items: center;
    font-size: 13px;
    margin-top: 8px;
}

.checkbox input {
    width: auto;
    margin-right: 8px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.error {
    color: #ff4d4d;
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
}

.loader {
    display: none;
    text-align: center;
    margin-top: 10px;
    color: #ff6666;
}

.bottom-text {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

.bottom-text a {
    color: #ff6666;
    text-decoration: none;
}

.bottom-text a:hover {
    text-decoration: underline;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Create Account</h1>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <div class="checkbox">
        <input type="checkbox" id="humanCheck">
        <label>I confirm I am not a bot</label>
    </div>

    <button onclick="register()">Create Account</button>

    <div class="loader" id="loader">Creating account...</div>
    <div class="error" id="error"></div>

    <div class="bottom-text">
        Already have an account? <a href="loging.html">Login</a>
    </div>
</div>

<script>
// 🔥 YOUR FIREBASE CONFIG (UNCHANGED)
var firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 🔥 REGISTER FUNCTION
function register() {
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim().toLowerCase();
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;
    let humanCheck = document.getElementById("humanCheck").checked;
    let error = document.getElementById("error");
    let loader = document.getElementById("loader");

    error.innerText = "";

    if (!name || !email || !password || !confirmPassword) {
        error.innerText = "Please fill all fields";
        return;
    }

    if (password !== confirmPassword) {
        error.innerText = "Passwords do not match";
        return;
    }

    if (!humanCheck) {
        error.innerText = "Confirm you are human";
        return;
    }

    loader.style.display = "block";

    // 🔥 CHECK IF EMAIL EXISTS
    db.ref("users").once("value", function(snapshot) {
        let exists = false;

        snapshot.forEach(function(child) {
            let user = child.val();

            if (user.email && user.email.toLowerCase() === email) {
                exists = true;
            }
        });

        if (exists) {
            loader.style.display = "none";
            error.innerText = "Email already exists";
            return;
        }

        // 🔥 CREATE ACCOUNT
        let userId = Date.now();

        db.ref("users/" + userId).set({
            name: name,
            email: email,
            password: password,
            balance: 0
        }).then(() => {
            loader.style.display = "none";
            alert("Account created successfully!");
            window.location.href = "loging.html";
        }).catch((err) => {
            loader.style.display = "none";
            error.innerText = err.message;
        });

    });
}
</script>

</body>
</html>
