<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottle Mania</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #00aaff; /* single consistent color */
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* BALANCE */
#balanceContainer {
    position: fixed;
    top: 10px;
    right: 15px;
    background: rgba(0,0,0,0.6);
    padding: 6px 15px;
    border-radius: 20px;
    font-weight: bold;
    z-index: 1000;
}

/* HEADER */
.header {
    text-align: center;
    margin-top: 30px;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
}

.header img {
    width: 100px;
    border-radius: 12px;
    margin-top: 10px;
}

/* GAME AREA */
.game-area {
    text-align: center;
    margin-top: 20px;
}

/* MULTIPLIER & CASHOUT TEXT */
#multiplier {
    font-size: 40px;
    font-family: 'Orbitron';
    margin-bottom: 15px;
    transition: transform 0.2s;
}

#result {
    font-size: 22px;
    margin-bottom: 15px;
}

/* BOTTLE IMAGE */
#imageContainer {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(255,255,255,0.1);
    display: none;
    margin-bottom: 20px;
    box-shadow: 0 0 20px #ff00cc, 0 0 40px #ff7b00;
    animation: glow 2s infinite alternate;
}

#imageContainer img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
}

/* Glow animation */
@keyframes glow {
    0% { box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff7b00; }
    50% { box-shadow: 0 0 25px #ff00cc, 0 0 50px #ff7b00; }
    100% { box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff7b00; }
}

/* STAKE & PREDICT BUTTON */
.controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
}

.controls input {
    width: 160px;
    padding: 10px;
    border-radius: 12px;
    border: none;
    text-align: center;
    font-size: 16px;
}

.controls button {
    width: 140px;
    padding: 12px;
    border-radius: 15px;
    border: none;
    background: #007BFF; /* solid blue button */
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.controls button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #0056b3, 0 0 25px #007BFF;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    transition: 0.3s;
}
</style>
</head>

<body>

<div id="balanceContainer">
  <span id="balanceAmount">0</span> COINS
</div>

<div class="header">
    <h1>BOTTLE MANIA</h1>
    <img src="bottle.jpg">
</div>

<div class="game-area">

    <div id="multiplier"></div>
    <div id="result"></div>

    <div id="imageContainer">
        <img src="bottle.jpg" alt="Bottle Image">
    </div>

    <div class="controls">
        <input type="number" id="stake" placeholder="Enter stake">
        <button id="predictBtn" onclick="predict()">PREDICT</button>
    </div>
</div>

<div id="toast"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const toast = document.getElementById("toast");
const balanceDisplay = document.getElementById("balanceAmount");
const imageContainer = document.getElementById("imageContainer");
const multiplierText = document.getElementById("multiplier");
const resultText = document.getElementById("result");
const predictBtn = document.getElementById("predictBtn");

let currentUserUid = null;
let currentUserEmail = null;

const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  projectId: "bets-d795d",
  storageBucket: "bets-d795d.appspot.com",
  messagingSenderId: "384386108287",
  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function showToast(msg){
    toast.innerText = msg;
    toast.style.opacity = 1;
    setTimeout(()=> toast.style.opacity = 0, 2000);
}

firebase.auth().onAuthStateChanged(user => {
  if (!user) { showToast("Login required"); return; }

  currentUserUid = user.uid;
  currentUserEmail = user.email;

  db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
    balanceDisplay.innerText = snap.val() || 0;
  });
});

function predict() {
    let stake = parseFloat(document.getElementById("stake").value);

    if (!stake || stake <= 0) {
        showToast("Please enter your 1win stake amount");
        return;
    }

    if (!currentUserUid) {
        showToast("User not logged in");
        return;
    }

    predictBtn.disabled = true;
    imageContainer.style.display = "block"; // show bottle image

    const userBalanceRef = db.ref("users/" + currentUserUid + "/balance");

    userBalanceRef.transaction(current => {
        current = current || 0;

        if (current < 1) {
            showToast("Insufficient balance");
            predictBtn.disabled = false;
            return;
        }

        return current - 1;
    }, (err, committed) => {
        if (committed) {

            const tx = {
                type: "bet",
                coins: -1,
                amount: stake,
                game: "Bottle Mania",
                ref: "BET-" + Date.now(),
                time: Date.now(),
                email: currentUserEmail,
                uid: currentUserUid
            };

            db.ref("users/" + currentUserUid + "/transactions").push(tx);
            db.ref("transactions").push(tx);

            runGame(stake);
        } else {
            predictBtn.disabled = false;
        }
    });
}

function runGame(stake) {
    let multiplier = 1.0;
    let chance = Math.random();
    let target = chance < 0.7 ? Math.random() * (1.70 - 1.30) + 1.30 : Math.random() * (3.00 - 1.71) + 1.71;

    const interval = setInterval(() => {
        multiplier += 0.02;
        let amount = (stake * multiplier).toFixed(2);

        multiplierText.innerText = multiplier.toFixed(2) + "x";
        multiplierText.style.transform = "scale(1.2)";
        resultText.innerText = "₦" + amount;

        setTimeout(()=> multiplierText.style.transform = "scale(1)", 100);

        if (multiplier >= target) {
            clearInterval(interval);
            let final = (stake * target).toFixed(2);

            multiplierText.innerText = "CASHOUT 💰";
            resultText.innerText = "₦" + final;
            predictBtn.disabled = false;
        }
    }, 60);
}
</script>

</body>
</html>
