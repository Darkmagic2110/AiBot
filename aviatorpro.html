<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nova Aviator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top,#2a0a0a 0%,#120606 45%,#050505 100%);
  overflow-x:hidden;
  color:white;
  position:relative;
}

.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(255,40,40,.18);
  filter:blur(120px);
  top:-220px;
  left:50%;
  transform:translateX(-50%);
}

.app{
  position:relative;
  z-index:10;
  width:100%;
  max-width:430px;
  margin:auto;
  padding:18px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:56px;
  height:56px;
  border-radius:18px;
  background:linear-gradient(135deg,#ff2a2a,#ff5a5a);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  font-weight:800;
  color:#1a0000;
  box-shadow:0 0 35px rgba(255,50,50,.55);
}

.brand h1{font-size:20px;font-weight:800;}
.brand p{font-size:12px;opacity:.6;}

/* BALANCE */
.balance-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:10px 15px;
  text-align:right;
  box-shadow:0 12px 35px rgba(0,0,0,.35);
}

.balance-card small{font-size:11px;opacity:.65;}
.balance-card h2{margin-top:4px;color:#ff4d4d;font-size:20px;}

/* MAIN */
.main-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(22px);
  border-radius:30px;
  padding:22px;
  box-shadow:0 20px 55px rgba(0,0,0,.45);
}

/* LIVE */
.live-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}

.live{
  background:#ff2a2a22;
  border:1px solid #ff2a2a55;
  color:#ff6b6b;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.session{font-size:12px;opacity:.6;}

/* TOGGLE */
.mode-toggle{
  display:flex;
  background:#1a0707;
  border-radius:18px;
  padding:5px;
  margin-bottom:18px;
}

.mode-btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
  color:#c9a0a0;
  font-weight:600;
}

.mode-btn.active{
  background:linear-gradient(135deg,#ff2a2a,#ff5a5a);
  color:#1a0000;
  box-shadow:0 10px 30px rgba(255,50,50,.45);
}

/* INFO */
.info-card{
  background:#1a0a0a;
  border-radius:18px;
  padding:16px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.06);
}

.info-title{font-size:12px;opacity:.6;margin-bottom:6px;}
#modeInfo{font-size:14px;color:#ff6b6b;font-weight:700;}

/* IMAGE */
.image-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:22px;
}

#botImage{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:28px;
  border:3px solid rgba(255,60,60,.3);
  box-shadow:0 0 45px rgba(255,50,50,.35);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);box-shadow:0 0 45px rgba(255,50,50,.35);}
  50%{transform:scale(1.03);box-shadow:0 0 65px rgba(255,50,50,.55);}
}

/* LOADING */
#loadingText{
  display:none;
  text-align:center;
  margin-bottom:20px;
  color:#ff6b6b;
  font-weight:700;
  animation:blink 1s infinite;
}

@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:.35;}
}

/* BUTTON */
#predictBtn{
  width:100%;
  border:none;
  background:linear-gradient(135deg,#ff2a2a,#ff5a5a);
  color:#1a0000;
  padding:18px;
  border-radius:18px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 12px 35px rgba(255,50,50,.4);
}

#predictBtn:disabled{opacity:.6;cursor:not-allowed;}

/* PREDICTION */
#predictionBox{
  display:none;
  margin-top:22px;
  background:linear-gradient(145deg,#1a0a0a,#0f0505);
  border-radius:22px;
  padding:20px;
  border:1px solid rgba(255,60,60,.18);
  box-shadow:0 0 35px rgba(255,50,50,.18);
}

.prediction-title{
  color:#ff6b6b;
  font-size:14px;
  margin-bottom:14px;
  font-weight:800;
  letter-spacing:1px;
}

.prediction-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.prediction-item:last-child{border-bottom:none;}

.label{opacity:.65;font-size:13px;}
.value{font-weight:800;color:#ff6b6b;font-size:16px;}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="app">

  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo">A</div>
      <div class="brand">
        <h1>Nova Aviator Pro</h1>
        <p>Red Quantum Engine</p>
      </div>
    </div>

    <div class="balance-card">
      <small>COINS</small>
      <h2><span id="balanceAmount">0</span></h2>
    </div>
  </div>

  <div class="main-card">

    <div class="live-bar">
      <div class="live">● LIVE SIGNAL</div>
      <div class="session" id="sessionId"></div>
    </div>

    <div class="mode-toggle">
      <div class="mode-btn active" id="regularBtn">Regular</div>
      <div class="mode-btn" id="premiumBtn">Premium</div>
    </div>

    <div class="info-card">
      <div class="info-title">ENGINE</div>
      <div id="modeInfo">Regular Engine Active</div>
    </div>

    <div class="image-wrap">
      <img id="botImage" src="aviator.jpg">
    </div>

    <div id="loadingText">Calculating Signal...</div>

    <button id="predictBtn">Generate Signal</button>

    <div id="predictionBox">

      <div class="prediction-title">BET ON AVIATOR</div>

      <div class="prediction-item">
        <div class="label">TIME</div>
        <div class="value" id="timeValue">--:--</div>
      </div>

      <div class="prediction-item">
        <div class="label">CASHOUT RANGE</div>
        <div class="value" id="cashRange">0x - 0x</div>
      </div>

      <div class="prediction-item">
        <div class="label">SAFE</div>
        <div class="value" id="safeValue">0.00x</div>
      </div>

    </div>

  </div>

  <div class="footer">Nova Aviator Pro © 2026</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey:"AIzaSyDvFDByPPo9zgwKLd...dummy",
  authDomain:"bets-d795d.firebaseapp.com",
  databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com",
  projectId:"bets-d795d",
  storageBucket:"bets-d795d.appspot.com",
  messagingSenderId:"384386108287",
  appId:"1:384386108287:android:d238a5ec8068d9bb9be84a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid=null;
let mode="regular";
let activePrediction=null;

/* SESSION */
document.getElementById("sessionId").innerText =
"SESSION #" + Math.floor(Math.random()*99999);

/* MODE */
regularBtn.onclick=()=>{
  mode="regular";
  regularBtn.classList.add("active");
  premiumBtn.classList.remove("active");
  modeInfo.innerText="Regular Engine Active";
  renderIfActive();
};

premiumBtn.onclick=()=>{
  mode="premium";
  premiumBtn.classList.add("active");
  regularBtn.classList.remove("active");
  modeInfo.innerText="Premium Engine Active";
  renderIfActive();
};

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
  if(!user) return;
  uid=user.uid;

  db.ref("users/"+uid+"/balance").on("value",s=>{
    balanceAmount.innerText=s.val()||0;
  });

  db.ref("users/"+uid+"/activePrediction").on("value",snap=>{
    activePrediction=snap.val();
    renderIfActive();
  });
});

/* HELPERS */
function rand(min,max){
  return (Math.random()*(max-min)+min).toFixed(2);
}

/* GENERATE */
document.getElementById("predictBtn").onclick=()=>generate();

function generate(){

  if(!uid || activePrediction) return;

  const cost=mode==="premium"?2:1;

  db.ref("users/"+uid+"/balance").transaction(v=>{
    v=v||0;
    if(v<cost) return;
    return v-cost;
  },(e,ok)=>{

    if(!ok) return;

    const now=new Date();

    const startOffset=Math.floor(Math.random()*2)+1; // 1-2 min
    const endOffset=startOffset+1;

    const start=new Date(now.getTime()+startOffset*60000);
    const end=new Date(now.getTime()+endOffset*60000);

    const payload={
      mode,
      start:start.getTime(),
      end:end.getTime(),
      cashMin: mode==="regular"
        ? rand(5,5.99)
        : rand(4,4.99),
      cashMax: mode==="regular"
        ? rand(9,9.99)
        : rand(6,6.99),
      safe: mode==="regular"
        ? rand(3,3.99)
        : rand(2,2.99)
    };

    db.ref("users/"+uid+"/activePrediction").set(payload);

    db.ref("users/"+uid+"/transactions").push({
      type:"bet",
      coins:-cost,
      game:"Aviator Pro",
      time:Date.now()
    });

  });

}

/* RENDER */
function renderIfActive(){

  if(!activePrediction) return;

  const now=Date.now();

  if(now >= activePrediction.end){

    db.ref("users/"+uid+"/activePrediction").remove();
    activePrediction=null;
    document.getElementById("predictBtn").disabled=false;
    document.getElementById("predictionBox").style.display="none";
    return;
  }

  document.getElementById("predictionBox").style.display="block";
  document.getElementById("predictBtn").disabled=true;

  const s=new Date(activePrediction.start);
  const e=new Date(activePrediction.end);

  document.getElementById("timeValue").innerText =
    `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')}
     - 
     ${String(e.getHours()).padStart(2,'0')}:${String(e.getMinutes()).padStart(2,'0')}`;

  document.getElementById("cashRange").innerText =
    `${activePrediction.cashMin}x - ${activePrediction.cashMax}x`;

  document.getElementById("safeValue").innerText =
    activePrediction.safe + "x";
}

</script>

</body>
</html>
