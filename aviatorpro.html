<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviator Predictor Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top,#2a0b0b,#0b0505);
  color:white;
  padding:18px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.balance{
  background:rgba(255,255,255,0.06);
  padding:10px 14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
}

.balance span{
  color:#ff884d;
  font-weight:800;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:18px;
}

/* MODE */
.toggle{
  display:flex;
  background:#1a0a0a;
  border-radius:14px;
  margin-bottom:15px;
}

.toggle div{
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  font-weight:700;
  color:#aaa;
}

.toggle .active{
  background:#ff3d00;
  color:white;
  border-radius:14px;
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#ff3d00,#ff7a00);
  color:white;
  font-weight:800;
  cursor:pointer;
  margin-top:15px;
}

/* RESULT */
.result{
  margin-top:20px;
  display:none;
  background:#120707;
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(255,120,80,0.2);
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.row:last-child{
  border-bottom:none;
}

.label{opacity:0.6}
.value{color:#ff884d;font-weight:800}
</style>
</head>

<body>

<div class="topbar">
  <h3>Aviator Pro</h3>
  <div class="balance">
    Coins: <span id="balanceAmount">0</span>
  </div>
</div>

<div class="card">

  <div class="toggle">
    <div id="regularBtn" class="active">Regular</div>
    <div id="premiumBtn">Premium</div>
  </div>

  <button id="predictBtn">GENERATE SIGNAL</button>

  <div class="result" id="resultBox">

    <div class="row">
      <div class="label">BET ON AVIATOR</div>
      <div class="value" id="timeRange"></div>
    </div>

    <div class="row">
      <div class="label">CASHOUT</div>
      <div class="value" id="cashout"></div>
    </div>

    <div class="row">
      <div class="label">SAFE ZONE</div>
      <div class="value" id="safe"></div>
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
  projectId: "bets-d795d",
  storageBucket: "bets-d795d.appspot.com",
  messagingSenderId: "384386108287",
  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid = null;
let mode = "regular";

/* MODE */
document.getElementById("regularBtn").onclick = () => {
  mode = "regular";
  regularBtn.classList.add("active");
  premiumBtn.classList.remove("active");
};

document.getElementById("premiumBtn").onclick = () => {
  mode = "premium";
  premiumBtn.classList.add("active");
  regularBtn.classList.remove("active");
};

/* AUTH */
firebase.auth().onAuthStateChanged(user=>{
  if(!user) return;
  uid = user.uid;

  db.ref("users/"+uid+"/balance").on("value",snap=>{
    document.getElementById("balanceAmount").innerText = snap.val() || 0;
  });

  loadSavedPrediction();
});

/* SAVE KEY */
function saveKey(){
  return "aviator_signal_" + uid;
}

/* GENERATE TIME */
function getTime(){
  const now = new Date();
  const addMin = 2 + Math.floor(Math.random()*2);

  const start = new Date(now.getTime() + (addMin*60000));
  const end = new Date(start.getTime() + 60000);

  return {
    start: start.toTimeString().slice(0,5),
    end: end.toTimeString().slice(0,5),
    expire: end.getTime()
  };
}

/* COEFFICIENT */
function getData(){
  if(mode==="regular"){
    return {
      cashout:(5 + Math.random()*4).toFixed(2),
      safe:"3.00x"
    };
  }else{
    return {
      cashout:(4 + Math.random()*2).toFixed(2),
      safe:"2.00x"
    };
  }
}

/* SHOW */
function show(data,time){

  document.getElementById("resultBox").style.display="block";

  document.getElementById("timeRange").innerText =
  time.start + " - " + time.end;

  document.getElementById("cashout").innerText =
  data.cashout + "x";

  document.getElementById("safe").innerText =
  data.safe;
}

/* SAVE */
function savePrediction(obj){
  localStorage.setItem(saveKey(), JSON.stringify(obj));
}

/* LOAD */
function loadSavedPrediction(){

  if(!uid) return;

  const saved = localStorage.getItem(saveKey());
  if(!saved) return;

  const data = JSON.parse(saved);

  if(Date.now() < data.expire){
    show(data.data, data.time);
  }else{
    localStorage.removeItem(saveKey());
  }
}

/* CLICK */
document.getElementById("predictBtn").onclick = () => {

  if(!uid) return alert("Login required");

  const cost = mode==="premium"?2:1;

  const ref = db.ref("users/"+uid+"/balance");

  ref.transaction(val=>{
    val = val || 0;
    if(val < cost) return;
    return val - cost;
  },(err,ok)=>{
    if(!ok) return;

    const time = getTime();
    const data = getData();

    const obj = {
      time,
      data,
      expire: time.expire
    };

    savePrediction(obj);
    show(data,time);

  });

};

</script>

</body>
</html>
