<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aviator Predictor Pro</title>

<style>
body{
    font-family: Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
    padding:20px;
}

button{
    padding:15px;
    border:none;
    border-radius:10px;
    background:orange;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.card{
    background:#1a1a1a;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

.mode{
    display:flex;
    justify-content:center;
    gap:10px;
}

.mode div{
    padding:10px;
    background:#333;
    cursor:pointer;
    border-radius:8px;
}

.mode .active{
    background:orange;
    color:black;
}

#result{
    margin-top:20px;
    display:none;
    background:#111;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>Aviator Predictor Pro</h2>

<h3>Balance: <span id="bal">0</span></h3>

<div class="mode">
    <div id="regular" class="active">Regular</div>
    <div id="premium">Premium</div>
</div>

<button id="predict">GENERATE SIGNAL</button>

<div id="result"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let uid = null;
let mode = "regular";

const bal = document.getElementById("bal");
const result = document.getElementById("result");

firebase.auth().onAuthStateChanged(user=>{
    if(!user) return alert("Login required");
    uid = user.uid;

    db.ref("users/"+uid+"/balance").on("value",s=>{
        bal.innerText = Math.floor(s.val()||0);
    });

    restoreSignal();
});

document.getElementById("regular").onclick=()=>{
    mode="regular";
    setModeUI();
};

document.getElementById("premium").onclick=()=>{
    mode="premium";
    setModeUI();
};

function setModeUI(){
    document.getElementById("regular").classList.toggle("active",mode==="regular");
    document.getElementById("premium").classList.toggle("active",mode==="premium");
}

/* COEFFICIENTS */
function cashoutRange(){
    if(mode==="premium"){
        return {
            min:4,
            max:6,
            safe:2
        };
    }
    return {
        min:5,
        max:9,
        safe:3
    };
}

function rand(min,max){
    return (Math.random()*(max-min)+min).toFixed(2);
}

/* TIME */
function getTimeRange(){
    const now = new Date();

    const startOffset = 2 + Math.floor(Math.random()*2); // 2–3 mins
    const start = new Date(now.getTime() + startOffset*60000);
    const end = new Date(start.getTime()+60000);

    const format = d =>
        String(d.getHours()).padStart(2,'0')+":"+
        String(d.getMinutes()).padStart(2,'0');

    return {start,end,text:`${format(start)} - ${format(end)}`};
}

/* SAVE */
function saveSignal(data){
    localStorage.setItem("aviator_signal",JSON.stringify(data));
}

/* RESTORE */
function restoreSignal(){
    const saved = localStorage.getItem("aviator_signal");
    if(!saved) return;

    const data = JSON.parse(saved);
    const now = Date.now();

    if(now > data.expiry){
        localStorage.removeItem("aviator_signal");
        return;
    }

    result.style.display="block";
    result.innerHTML = data.html;
}

/* GENERATE */
document.getElementById("predict").onclick=async()=>{

    if(!uid) return;

    const cost = mode==="premium"?2:1;

    const ref = db.ref("users/"+uid+"/balance");

    ref.transaction(b=>{
        b = b||0;
        if(b < cost){
            alert("No balance");
            return;
        }
        return b - cost;
    },(e,ok)=>{
        if(!ok) return;

        db.ref("users/"+uid+"/transactions").push({
            type:"bet",
            coins:-cost,
            game:"aviator",
            time:Date.now()
        });

        generateSignal();
    });
};

function generateSignal(){

    const range = cashoutRange();
    const time = getTimeRange();

    const cashMin = rand(range.min, range.max);
    const cashMax = rand(parseFloat(cashMin)+0.5, range.max+1);
    const safe = range.safe.toFixed(2);

    const html = `
    <h3>BET ON AVIATOR</h3>
    <h2>${time.text}</h2>
    <p>${cashMin}X - ${cashMax}X CASHOUT</p>
    <p><b>SAFE : ${safe}X</b></p>
    `;

    result.style.display="block";
    result.innerHTML = html;

    const expiry = time.end.getTime();

    saveSignal({
        html,
        expiry
    });
}
</script>

</body>
</html>
