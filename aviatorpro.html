<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top,#2a0000 0%,#120000 50%,#050505 100%);
  overflow-x:hidden;
  color:white;
  position:relative;
}

/* glow */
.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(255,0,0,.18);
  filter:blur(120px);
  top:-200px;
  left:50%;
  transform:translateX(-50%);
}

.app{
  position:relative;
  z-index:5;
  width:100%;
  max-width:430px;
  margin:auto;
  padding:18px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.logo-wrap{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:56px;
  height:56px;
  border-radius:18px;
  background:linear-gradient(135deg,#ff0000,#7a0000);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:24px;
  box-shadow:0 0 35px rgba(255,0,0,.55);
}

.brand h1{
  font-size:20px;
  font-weight:800;
}

.brand p{
  font-size:12px;
  opacity:.6;
}

/* BALANCE */
.balance-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:10px 15px;
  text-align:right;
}

.balance-card h2{
  color:#ff3b3b;
}

/* MAIN */
.main-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(22px);
  border-radius:30px;
  padding:22px;
}

/* LIVE */
.live-bar{
  display:flex;
  justify-content:space-between;
  margin-bottom:18px;
}

.live{
  background:#ff000022;
  border:1px solid #ff000055;
  color:#ff6b6b;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.session{
  font-size:12px;
  opacity:.6;
}

/* MODE */
.mode-toggle{
  display:flex;
  background:#120000;
  border-radius:18px;
  padding:5px;
  margin-bottom:18px;
}

.mode-btn{
  flex:1;
  padding:14px;
  text-align:center;
  cursor:pointer;
  color:#aaa;
  font-weight:600;
}

.mode-btn.active{
  background:linear-gradient(135deg,#ff0000,#7a0000);
  border-radius:14px;
  color:white;
}

/* IMAGE */
.image-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

#botImage{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:28px;
  border:3px solid rgba(255,0,0,.35);
  box-shadow:0 0 45px rgba(255,0,0,.35);
  animation:pulse 2.5s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

/* BUTTON */
#predictBtn{
  width:100%;
  border:none;
  background:linear-gradient(135deg,#ff0000,#7a0000);
  color:white;
  padding:18px;
  border-radius:18px;
  font-size:16px;
  font-weight:800;
}

/* PREDICTION */
#predictionBox{
  display:none;
  margin-top:22px;
  background:#120000;
  border-radius:22px;
  padding:20px;
  border:1px solid rgba(255,0,0,.2);
}

.prediction-title{
  color:#ff4d4d;
  font-weight:800;
  margin-bottom:14px;
}

.prediction-item{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}

.value{
  color:#ff4d4d;
  font-weight:800;
}

/* FX */
.rocket{
  position:fixed;
  font-size:40px;
  z-index:9999;
  pointer-events:none;
}

.trail{
  position:fixed;
  width:10px;
  height:10px;
  background:#ff0000;
  border-radius:50%;
  z-index:9998;
  pointer-events:none;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="app">

<div class="topbar">
  <div class="logo-wrap">
    <div class="logo">A</div>
    <div>
      <h1>Aviator Pro</h1>
      <p>Signal Engine</p>
    </div>
  </div>

  <div class="balance-card">
    <small>COINS</small>
    <h2 id="balanceAmount">0</h2>
  </div>
</div>

<div class="main-card">

<div class="live-bar">
  <div class="live">● LIVE SIGNAL</div>
  <div class="session" id="sessionId"></div>
</div>

<div class="mode-toggle">
  <div class="mode-btn active" id="regularBtn">Regular</div>
  <div class="mode-btn" id="premiumBtn">Premium</div>
</div>

<div class="image-wrap">
  <img id="botImage" src="aviator.jpg">
</div>

<div id="loadingText" style="display:none;text-align:center;color:#ff4d4d;margin-bottom:10px;font-weight:700;">
  Generating Signal...
</div>

<button id="predictBtn">Generate Signal</button>

<div id="predictionBox">

  <div class="prediction-title">AVIATOR PRO SIGNAL</div>

  <div class="prediction-item">
    <span>BET ON AVIATOR</span>
    <span id="timeValue"></span>
  </div>

  <div class="prediction-item">
    <span>CASHOUT</span>
    <span id="coefValue"></span>
  </div>

  <div class="prediction-item">
    <span>SAFE</span>
    <span id="safeValue"></span>
  </div>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {
 apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
 authDomain:"bets-d795d.firebaseapp.com",
 databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com",
 projectId:"bets-d795d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let uid=null;
let active=null;

function pad(n){return n<10?"0"+n:n;}

firebase.auth().onAuthStateChanged(user=>{
 if(!user) return;
 uid=user.uid;

 db.ref("users/"+uid+"/balance").on("value",s=>{
  document.getElementById("balanceAmount").innerText=s.val()||0;
 });

 const saved=localStorage.getItem("aviator_pro");
 if(saved){
  const data=JSON.parse(saved);
  if(Date.now()<data.expiry){
    active=data;
    show(data);
  }else{
    localStorage.removeItem("aviator_pro");
  }
 }
});

document.getElementById("sessionId").innerText="SESSION #"+Math.floor(Math.random()*99999);

let mode="regular";

document.getElementById("regularBtn").onclick=()=>mode="regular";
document.getElementById("premiumBtn").onclick=()=>mode="premium";

document.getElementById("predictBtn").onclick=generate;

function generate(){

 if(active && Date.now()<active.expiry){
  alert("Wait for current signal");
  return;
 }

 const now=new Date();
 const offset=2+Math.floor(Math.random()*2);

 const start=new Date(now.getTime()+offset*60000);
 const end=new Date(start.getTime()+60000);

 const t1=pad(start.getHours())+":"+pad(start.getMinutes());
 const t2=pad(end.getHours())+":"+pad(end.getMinutes());

 const regularCash=(Math.random()*(9-5)+5).toFixed(2);
 const premiumCash=(Math.random()*(6-4)+4).toFixed(2);
 const safe=(Math.random()*(3-2)+2).toFixed(2);

 const data={
  start:t1,
  end:t2,
  cash:regularCash,
  premium:premiumCash,
  safe:safe,
  expiry:end.getTime()
 };

 active=data;
 localStorage.setItem("aviator_pro",JSON.stringify(data));

 animateShow(data);
}

function animateShow(d){

 document.getElementById("predictionBox").style.display="block";

 document.getElementById("timeValue").innerText=d.start+" - "+d.end;

 document.getElementById("coefValue").innerText=
 mode==="premium"
 ? "4.00X - 6.00X CASHOUT"
 : "5.00X - 9.00X CASHOUT";

 document.getElementById("safeValue").innerText=
 mode==="premium" ? "SAFE : 2.00X" : "SAFE : 3.00X";
}

</script>

</body>
</html>
