<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviator Pro Red</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top,#2a0000 0%,#120000 45%,#050505 100%);
  color:white;
  overflow-x:hidden;
}

/* glow */
.bg-glow{
  position:absolute;
  width:520px;
  height:520px;
  border-radius:50%;
  background:rgba(255,0,0,.18);
  filter:blur(120px);
  top:-200px;
  left:50%;
  transform:translateX(-50%);
}

.app{
  position:relative;
  z-index:5;
  max-width:430px;
  margin:auto;
  padding:18px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.logo{
  width:56px;
  height:56px;
  border-radius:18px;
  background:linear-gradient(135deg,#ff0000,#ff4d4d);
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:900;
  box-shadow:0 0 30px rgba(255,0,0,.5);
}

.brand h1{
  font-size:20px;
  font-weight:800;
}

.brand p{
  font-size:12px;
  opacity:.6;
}

/* BALANCE */
.balance-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:10px 14px;
  text-align:right;
}

.balance-card h2{
  color:#ff3b3b;
}

/* MAIN */
.main-card{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:26px;
  padding:20px;
  backdrop-filter:blur(18px);
}

/* toggle */
.mode-toggle{
  display:flex;
  background:#1a0000;
  border-radius:16px;
  padding:5px;
  margin-bottom:14px;
}

.mode-btn{
  flex:1;
  padding:12px;
  text-align:center;
  border-radius:12px;
  font-weight:700;
  color:#aaa;
  cursor:pointer;
}

.mode-btn.active{
  background:linear-gradient(135deg,#ff0000,#ff4d4d);
  color:white;
}

/* INFO */
.info{
  background:#120000;
  padding:14px;
  border-radius:14px;
  margin-bottom:14px;
  border:1px solid rgba(255,0,0,.2);
}

.info span{
  color:#ff4d4d;
  font-weight:700;
}

/* IMAGE */
.image-wrap{
  display:flex;
  justify-content:center;
  margin-bottom:14px;
}

.image-wrap img{
  width:200px;
  border-radius:20px;
  border:2px solid rgba(255,0,0,.4);
  box-shadow:0 0 40px rgba(255,0,0,.25);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  font-weight:800;
  font-size:15px;
  color:white;
  background:linear-gradient(135deg,#ff0000,#ff4d4d);
  box-shadow:0 10px 30px rgba(255,0,0,.3);
  cursor:pointer;
}

button:disabled{
  opacity:.5;
}

/* loading */
#loading{
  text-align:center;
  margin:10px 0;
  color:#ff4d4d;
  display:none;
}

/* RESULT */
#predictionBox{
  display:none;
  margin-top:16px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(145deg,#1a0000,#0d0000);
  border:1px solid rgba(255,0,0,.25);
  box-shadow:0 0 25px rgba(255,0,0,.2);
}

.title{
  font-weight:800;
  color:#ff4d4d;
  letter-spacing:1px;
  margin-bottom:10px;
}

.big{
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}

.value{
  font-size:18px;
  font-weight:800;
  color:#fff;
}

.cool{
  background:linear-gradient(90deg,#ff0000,#ff6666);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:900;
}

.footer{
  text-align:center;
  margin-top:14px;
  opacity:.4;
  font-size:12px;
}

/* rocket */
.rocket{
  position:fixed;
  font-size:40px;
  z-index:999;
}
</style>
</head>

<body>
<div class="bg-glow"></div>

<div class="app">

<div class="topbar">
  <div class="logo">A</div>
  <div class="brand">
    <h1>Aviator Pro</h1>
    <p>Red Quantum Engine</p>
  </div>
  <div class="balance-card">
    <small>BALANCE</small>
    <h2 id="balance">0</h2>
  </div>
</div>

<div class="main-card">

<div class="mode-toggle">
  <div class="mode-btn active" id="regular">Regular</div>
  <div class="mode-btn" id="premium">Premium</div>
</div>

<div class="info">
  Engine: <span id="modeText">Regular Mode</span>
</div>

<div class="image-wrap">
  <img src="aviator.jpg" />
</div>

<div id="loading">Calculating signal...</div>

<button id="btn">Generate Signal</button>

<div id="predictionBox">

  <div class="title">BET ON AVIATOR</div>

  <div class="big">TIME WINDOW</div>
  <div class="value" id="time"></div>

  <div class="big">CASHOUT RANGE</div>
  <div class="value cool" id="cash"></div>

  <div class="big">SAFE ZONE</div>
  <div class="value" id="safe"></div>

</div>

</div>

<div class="footer">Aviator Pro System © 2026</div>
</div>

<script>
let mode="regular";
let cooldown=null;

const btn=document.getElementById("btn");
const loading=document.getElementById("loading");
const box=document.getElementById("predictionBox");

const regular=document.getElementById("regular");
const premium=document.getElementById("premium");

regular.onclick=()=>{
mode="regular";
regular.classList.add("active");
premium.classList.remove("active");
document.getElementById("modeText").innerText="Regular Mode";
};

premium.onclick=()=>{
mode="premium";
premium.classList.add("active");
regular.classList.remove("active");
document.getElementById("modeText").innerText="Premium Mode";
};

function gen(){
if(cooldown && Date.now()<cooldown){
alert("Wait for current signal");
return;
}

loading.style.display="block";
box.style.display="none";
btn.disabled=true;

setTimeout(()=>{
loading.style.display="none";

const now=new Date();
const start=new Date(now.getTime()+2*60000);

const end=new Date(start.getTime()+60000);

const r1=mode==="premium"?4.18:5.22;
const r2=mode==="premium"?6.88:9.59;
const safe=mode==="premium"?2.17:3.31;

document.getElementById("time").innerText=
start.getHours()+":"+String(start.getMinutes()).padStart(2,"0")+" - "+
end.getHours()+":"+String(end.getMinutes()).padStart(2,"0");

document.getElementById("cash").innerText=
r1.toFixed(2)+"X - "+r2.toFixed(2)+"X CASHOUT";

document.getElementById("safe").innerText=
"SAFE : "+safe.toFixed(2)+"X";

box.style.display="block";

cooldown=end.getTime()+60000;
localStorage.setItem("cooldown",cooldown);

btn.disabled=false;

},2000);
}

btn.onclick=gen;

window.onload=()=>{
const saved=localStorage.getItem("cooldown");
if(saved && Date.now()<saved){
btn.disabled=true;
document.getElementById("loading").style.display="block";
setTimeout(()=>{
btn.disabled=false;
document.getElementById("loading").style.display="none";
},1500);
}
};
</script>

</body>
</html>
