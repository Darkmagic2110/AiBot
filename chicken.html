<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHICKEN RUN</title>

<style>
  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: rgba(0, 50, 0, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Arial Black", sans-serif;
    color: yellow;
    text-align: center;
  }

  h1 {
    font-size: 50px;
    font-weight: bold;
    color: yellow;
    margin-bottom: 20px;
    text-shadow: 0 0 15px yellow;
  }

  #balanceContainer {
    position: fixed;
    top: 10px;
    right: 15px;
    background: #1a1a1a;
    padding: 5px 12px;
    border-radius: 20px;
    color: #fff;
    font-weight: bold;
    z-index: 9999;
  }

  #coefficient {
    font-size: 55px;
    font-weight: 900;
    color: yellow;
    text-shadow: 0 0 20px yellow;
    margin-bottom: 10px;
    display: none;
  }

  #chicken {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 25px;
    display: none;
    margin-bottom: 15px;
  }

  .difficulty {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .option {
    border: 2px solid yellow;
    padding: 8px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    color: yellow;
    transition: 0.3s;
  }

  .option.active {
    background: yellow;
    color: darkgreen;
  }

  button {
    background: transparent;
    border: 2px solid yellow;
    color: yellow;
    font-size: 22px;
    font-weight: bold;
    padding: 10px 30px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 25px;
  }

  button:hover {
    background: yellow;
    color: darkgreen;
  }

  .blink {
    animation: blink 4s infinite alternate ease-in-out;
  }

  @keyframes blink {
    from { opacity: 0.4; }
    to { opacity: 1.0; }
  }

  #toast {
    visibility: hidden;
    min-width: 240px;
    background-color: rgba(255, 255, 0, 0.95);
    color: darkgreen;
    text-align: center;
    border-radius: 10px;
    padding: 14px;
    position: fixed;
    z-index: 1;
    left: 50%;
    bottom: 30px;
    font-weight: bold;
    font-size: 18px;
    transform: translateX(-50%);
    box-shadow: 0 0 20px yellow;
  }

  #toast.show {
    visibility: visible;
    animation: fadein 0.6s, fadeout 0.6s 2.4s;
  }

  @keyframes fadein {
    from { bottom: 10px; opacity: 0; }
    to { bottom: 30px; opacity: 1; }
  }

  @keyframes fadeout {
    from { bottom: 30px; opacity: 1; }
    to { bottom: 10px; opacity: 0; }
  }
</style>
</head>

<body>

  <h1>𝐂𝐇𝐈𝐂𝐊𝐄𝐍 𝐑𝐔𝐍</h1>

  <!-- Balance -->
  <div id="balanceContainer">
      Balance: <span id="balanceAmount">0</span> COINS
  </div>

  <!-- Coefficient above the chicken -->
  <div id="coefficient" class="blink"></div>

  <!-- Chicken image -->
  <img id="chicken" src="chicken.jpg" alt="Chicken" class="blink">

  <!-- Difficulty options -->
  <div class="difficulty">
    <div class="option" id="easy">𝐄𝐀𝐒𝐘</div>
    <div class="option" id="medium">𝐌𝐄𝐃𝐈𝐔𝐌</div>
    <div class="option" id="hard">𝐇𝐀𝐑𝐃</div>
    <div class="option" id="hardcore">𝐇𝐀𝐑𝐃𝐂𝐎𝐑𝐄</div>
  </div>

  <!-- Predict button -->
  <button id="predictBtn">𝐏𝐑𝐄𝐃𝐈𝐂𝐓</button>

  <!-- Toast message -->
  <div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  const options = document.querySelectorAll(".option");
  const predictBtn = document.getElementById("predictBtn");
  const coeff = document.getElementById("coefficient");
  const chicken = document.getElementById("chicken");
  const toast = document.getElementById("toast");
  const balanceDisplay = document.getElementById("balanceAmount");

  let selected = null;
  let currentUserUid = null;

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Auth check
  firebase.auth().onAuthStateChanged(user => {
    if (!user) { alert("Please login first"); return; }
    currentUserUid = user.uid;

    // Fetch balance
    db.ref("users/" + currentUserUid + "/balance").once("value").then(snap => {
      const val = snap.val();
      balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
    });

    // Real-time listener
    db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
      const val = snap.val();
      balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
    });
  });

  // Difficulty selection
  options.forEach(opt => {
    opt.addEventListener("click", () => {
      options.forEach(o => o.classList.remove("active"));
      opt.classList.add("active");
      selected = opt.id;
    });
  });

  // Toast function
  function showToast(message) {
    toast.textContent = message;
    toast.className = "show";
    setTimeout(() => {
      toast.className = toast.className.replace("show", "");
    }, 3000);
  }

  // Predict button click
  predictBtn.addEventListener("click", () => {
    if (!selected) {
      showToast("Please choose a difficulty first!");
      return;
    }

    if (!currentUserUid) {
      showToast("Please login first!");
      return;
    }

    // Deduct 1 coin and log transaction
    const userBalanceRef = db.ref("users/" + currentUserUid + "/balance");
    userBalanceRef.transaction(current => {
      current = current || 0;
      if (current < 1) { showToast("Insufficient balance!"); return; }
      return current - 1;
    }, (err, committed, snapshot) => {
      if (!committed) return;

      // ✅ Add transaction log for deduction
      db.ref("users/" + currentUserUid + "/transactions").push({
        type: "bet",
        coins: -1,
        game: "Chicken Run",
        ref: "BET-" + Date.now(),
        time: Date.now(),
        uid: currentUserUid
      });

      // Proceed with coefficient
      let values = [];
      if (selected === "easy") values = ["1.3X","1.4X","1.5X","1.6X","1.7X","1.8X","1.9X","2.0X","2.2X","2.4X","2.6X","2.8X","3.0X","3.5X"];
      else if (selected === "medium") values = ["1.4X","1.6X","1.8X","2.0X","2.2X","2.4X","2.7X","3.0X"];
      else if (selected === "hard") values = ["1.5X","1.7X","2.0X","3.0X","4.5X"];
      else if (selected === "hardcore") values = ["2.5X","5.0X","10.0X"];

      const randomCoeff = values[Math.floor(Math.random() * values.length)];
      coeff.textContent = randomCoeff;
      coeff.style.display = "block";
      chicken.style.display = "block";
    });
  });
</script>

</body>
</html>
