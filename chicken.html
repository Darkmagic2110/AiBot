<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Chicken Run X</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{

min-height:100vh;

background:
radial-gradient(circle at top,#1d3000 0%,#101c00 45%,#050700 100%);

overflow-x:hidden;

color:white;

position:relative;

}

.bg-glow{

position:absolute;

width:500px;

height:500px;

border-radius:50%;

background:rgba(255,230,0,.12);

filter:blur(120px);

top:-220px;

left:50%;

transform:translateX(-50%);

}

.app{

position:relative;

z-index:10;

width:100%;

max-width:430px;

margin:auto;

padding:18px;

}

/* TOPBAR */

.topbar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:24px;

}

.logo-wrap{

display:flex;

align-items:center;

gap:12px;

}

.logo{

width:56px;

height:56px;

border-radius:18px;

background:
linear-gradient(135deg,#ffe600,#c7ff00);

display:flex;

justify-content:center;

align-items:center;

font-size:24px;

font-weight:800;

color:#172000;

box-shadow:
0 0 35px rgba(255,230,0,.45);

}

.brand h1{

font-size:20px;

font-weight:800;

}

.brand p{

font-size:12px;

opacity:.6;

}

/* BALANCE */

.balance-card{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:18px;

padding:10px 15px;

text-align:right;

box-shadow:
0 12px 35px rgba(0,0,0,.35);

}

.balance-card small{

font-size:11px;

opacity:.65;

}

.balance-card h2{

margin-top:4px;

color:#ffe600;

font-size:20px;

}

/* MAIN */

.main-card{

background:rgba(255,255,255,.05);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(22px);

border-radius:30px;

padding:22px;

box-shadow:
0 20px 55px rgba(0,0,0,.45);

}

/* LIVE */

.live-bar{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:18px;

}

.live{

background:#ffe60022;

border:1px solid #ffe60055;

color:#ffe600;

padding:8px 14px;

border-radius:999px;

font-size:12px;

font-weight:700;

}

.session{

font-size:12px;

opacity:.6;

}

/* IMAGE */

.image-wrap{

display:flex;

justify-content:center;

align-items:center;

margin-bottom:28px;

position:relative;

flex-direction:column;

gap:14px;

}

#chicken{

width:160px;

height:160px;

object-fit:cover;

border-radius:28px;

border:3px solid rgba(255,230,0,.20);

box-shadow:
0 0 35px rgba(255,230,0,.18);

animation:pulse 2.5s infinite;

}

@keyframes pulse{

0%,100%{

transform:scale(1);

box-shadow:
0 0 35px rgba(255,230,0,.18);

}

50%{

transform:scale(1.03);

box-shadow:
0 0 60px rgba(255,230,0,.35);

}

}

#coefficient{

position:relative;

background:
linear-gradient(135deg,#ffe600,#c7ff00);

color:#172000;

padding:10px 20px;

border-radius:16px;

font-size:26px;

font-weight:900;

box-shadow:
0 10px 30px rgba(255,230,0,.28);

display:none;

min-width:130px;

text-align:center;

}

/* DIFFICULTY */

.mode-title{

font-size:12px;

opacity:.6;

margin-bottom:10px;

text-align:left;

}

.difficulty{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:12px;

margin-bottom:22px;

}

.option{

background:#0f1505;

border:1px solid rgba(255,255,255,.08);

padding:15px;

border-radius:18px;

cursor:pointer;

transition:.25s;

text-align:center;

font-weight:700;

color:#c9d3b5;

}

.option.active{

background:
linear-gradient(135deg,#ffe600,#c7ff00);

color:#172000;

box-shadow:
0 10px 30px rgba(255,230,0,.35);

transform:translateY(-2px);

}

/* INFO CARD */

.info-card{

background:#0f1505;

border-radius:18px;

padding:16px;

margin-bottom:22px;

border:1px solid rgba(255,255,255,.06);

}

.info-title{

font-size:12px;

opacity:.6;

margin-bottom:8px;

}

.info-value{

font-size:15px;

font-weight:700;

color:#ffe600;

}

/* BUTTON */

#predictBtn{

width:100%;

border:none;

background:
linear-gradient(135deg,#ffe600,#c7ff00);

color:#172000;

padding:18px;

border-radius:18px;

font-size:16px;

font-weight:800;

cursor:pointer;

transition:.25s;

box-shadow:
0 12px 35px rgba(255,230,0,.35);

}

#predictBtn:hover{

transform:translateY(-2px);

}

#predictBtn:active{

transform:scale(.98);

}

/* LOADING */

#loading{

display:none;

text-align:center;

margin-bottom:20px;

color:#ffe600;

font-weight:700;

animation:blink 1s infinite;

}

@keyframes blink{

0%,100%{
opacity:1;
}

50%{
opacity:.35;
}

}

/* TOAST */

#toast{

visibility:hidden;

min-width:220px;

background:
linear-gradient(135deg,#ffe600,#c7ff00);

color:#172000;

text-align:center;

border-radius:14px;

padding:14px;

position:fixed;

bottom:40px;

left:50%;

transform:translateX(-50%);

z-index:99999;

font-weight:700;

box-shadow:
0 12px 35px rgba(255,230,0,.35);

}

#toast.show{

visibility:visible;

animation:fadein .4s, fadeout .4s 2.2s;

}

@keyframes fadein{

from{
opacity:0;
bottom:10px;
}

to{
opacity:1;
bottom:40px;
}

}

@keyframes fadeout{

from{
opacity:1;
bottom:40px;
}

to{
opacity:0;
bottom:10px;
}

}

/* FOOTER */

.footer{

text-align:center;

margin-top:18px;

opacity:.4;

font-size:12px;

}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="app">

<div class="topbar">

<div class="logo-wrap">

<div class="logo">
🐔
</div>

<div class="brand">

<h1>Chicken Run X</h1>

<p>Advanced Route Engine</p>

</div>

</div>

<div class="balance-card">

<small>AVAILABLE COINS</small>

<h2>
<span id="balanceAmount">0</span>
</h2>

</div>

</div>

<div class="main-card">

<div class="live-bar">

<div class="live">
● LIVE ANALYTICS
</div>

<div class="session"
id="sessionId">
SESSION #0000
</div>

</div>

<div class="image-wrap">

<img id="chicken"
src="chicken.jpg"
alt="Chicken Run">

<div id="coefficient">
1.00X
</div>

</div>

<div class="mode-title">
SELECT DIFFICULTY
</div>

<div class="difficulty">

<div class="option"
id="easy">
Easy
</div>

<div class="option"
id="medium">
Medium
</div>

<div class="option"
id="hard">
Hard
</div>

<div class="option"
id="hardcore">
Hardcore
</div>

</div>

<div class="info-card">

<div class="info-title">
CURRENT ENGINE
</div>

<div class="info-value"
id="engineText">
Balanced Route Engine Enabled
</div>

</div>

<div id="loading">
🚀 Calculating Safe Route...
</div>

<button id="predictBtn">
Generate Chicken Route
</button>

</div>

<div class="footer">
Chicken Run X © 2026
</div>

</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const options =
document.querySelectorAll(".option");

const predictBtn =
document.getElementById("predictBtn");

const coefficient =
document.getElementById("coefficient");

const toast =
document.getElementById("toast");

const balanceDisplay =
document.getElementById("balanceAmount");

const loading =
document.getElementById("loading");

const engineText =
document.getElementById("engineText");

document.getElementById("sessionId").innerText =
"SESSION #" +
Math.floor(Math.random()*99999);

/* FIREBASE */

const firebaseConfig = {

apiKey:
"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",

authDomain:
"bets-d795d.firebaseapp.com",

projectId:
"bets-d795d",

storageBucket:
"bets-d795d.appspot.com",

messagingSenderId:
"384386108287",

appId:
"1:384386108287:android:d238a5ec8068d9bb9be84a",

databaseURL:
"https://bets-d795d-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentUserUid = null;

let selected = null;

/* LOGIN */

firebase.auth().onAuthStateChanged(user => {

if(!user){

showToast("Please login first");

return;

}

currentUserUid = user.uid;

db.ref(
"users/" +
currentUserUid +
"/balance"
).on("value", snap => {

balanceDisplay.innerText =
snap.val() || 0;

});

});

/* SELECT */

options.forEach(opt => {

opt.addEventListener("click", () => {

options.forEach(o => {

o.classList.remove("active");

});

opt.classList.add("active");

selected = opt.id;

if(selected === "easy"){

engineText.innerText =
"Safe Route Engine Enabled";

}

else if(selected === "medium"){

engineText.innerText =
"Balanced Route Engine Enabled";

}

else if(selected === "hard"){

engineText.innerText =
"Risk Route Engine Enabled";

}

else{

engineText.innerText =
"Extreme Quantum Engine Enabled";

}

});

});

/* TOAST */

function showToast(msg){

toast.textContent = msg;

toast.className = "show";

setTimeout(() => {

toast.className = "";

}, 2600);

}

/* BUTTON */

predictBtn.addEventListener("click", () => {

if(!selected){

showToast("Select difficulty");

return;

}

if(!currentUserUid){

showToast("Login first");

return;

}

const ref =
db.ref(
"users/" +
currentUserUid +
"/balance"
);

ref.transaction(current => {

current = current || 0;

if(current < 1){

showToast("Insufficient balance");

return;

}

return current - 1;

}, (err, committed) => {

if(!committed) return;

db.ref(
"users/" +
currentUserUid +
"/transactions"
).push({

type:"bet",

coins:-1,

game:"Chicken Run",

ref:"BET-" + Date.now(),

time:Date.now(),

uid:currentUserUid

});

startPrediction();

});

});

/* START */

function startPrediction(){

predictBtn.disabled = true;

loading.style.display = "block";

coefficient.style.display = "none";

setTimeout(() => {

loading.style.display = "none";

showResult();

predictBtn.disabled = false;

}, 2200);

}

/* RESULT */

function showResult(){

let values = [];

if(selected === "easy"){

values = [
"1.3X","1.4X","1.5X",
"1.6X","1.7X","1.8X",
"1.9X","2.0X","2.2X",
"2.4X","2.6X","2.8X",
"3.0X"
];

}

else if(selected === "medium"){

values = [
"1.4X","1.6X","1.8X",
"2.0X","2.2X","2.5X",
"2.8X","3.0X"
];

}

else if(selected === "hard"){

values = [
"1.8X","2.0X","2.5X",
"3.0X","4.5X","5.0X"
];

}

else{

values = [
"5.0X","10.0X","25.0X"
];

}

const finalValue =
values[
Math.floor(
Math.random() * values.length
)
];

coefficient.style.display = "block";

animateCoefficient(finalValue);

}

/* ANIMATION */

function animateCoefficient(target){

let current = 1.00;

const end =
parseFloat(target);

let count = 0;

const steps = 45;

const interval =
setInterval(() => {

count++;

current =
1 +
(
(end - 1) *
(count / steps)
);

coefficient.innerText =
current.toFixed(2) + "X";

if(count >= steps){

clearInterval(interval);

coefficient.innerText =
target;

}

}, 22);

}

</script>

</body>
</html>
