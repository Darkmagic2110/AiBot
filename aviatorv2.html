<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nova Aviator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top,#3a0d0d 0%,#130707 45%,#050505 100%);
  overflow-x:hidden;
  color:white;
  position:relative;
}

.bg-glow{
  position:absolute;
  width:500px;
  height:500px;
  border-radius:50%;
  background:rgba(255,60,0,.18);
  filter:blur(120px);
  top:-200px;
  left:50%;
  transform:translateX(-50%);
}

.app{
  position:relative;
  z-index:5;
  width:100%;
  max-width:430px;
  margin:auto;
  padding:18px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.logo-wrap{display:flex;align-items:center;gap:12px;}

.logo{
  width:56px;height:56px;border-radius:18px;
  background:linear-gradient(135deg,#ff3300,#ff6600);
  display:flex;justify-content:center;align-items:center;
  font-size:24px;font-weight:800;
  box-shadow:0 0 35px rgba(255,80,0,.55);
}

.balance-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  border-radius:18px;
  padding:10px 15px;
  text-align:right;
}

.main-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(22px);
  border-radius:30px;
  padding:22px;
}

/* BUTTON */
#predictBtn{
  width:100%;
  border:none;
  background:linear-gradient(135deg,#ff3300,#ff6600);
  color:white;
  padding:18px;
  border-radius:18px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}

/* PREDICTION BOX */
#predictionBox{
  display:none;
  margin-top:22px;
  background:linear-gradient(145deg,#1a0d08,#120906);
  border-radius:22px;
  padding:20px;
  border:1px solid rgba(255,120,80,.18);
  box-shadow:0 0 35px rgba(255,80,0,.18);
  font-family: monospace;
}

.pred-title{
  color:#ff884d;
  font-weight:800;
  margin-bottom:14px;
  letter-spacing:1px;
}

.pred-line{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,.06);
}

.pred-line:last-child{border-bottom:none;}

.label{opacity:.6;}

.value{color:#ff884d;font-weight:800;}

/* INFO */
.info{
  margin-top:14px;
  padding:12px;
  background:#150c08;
  border-radius:12px;
  font-size:12px;
  color:#ffb199;
  border:1px solid rgba(255,255,255,.06);
}

.rocket{
  position:fixed;
  font-size:42px;
  z-index:9999;
  pointer-events:none;
}

.trail{
  position:fixed;
  width:10px;height:10px;
  background:#ff5500;
  border-radius:50%;
  box-shadow:0 0 15px #ff5500;
  z-index:9998;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="app">

  <div class="topbar">
    <div class="logo-wrap">
      <div class="logo">N</div>
      <h3>Nova Aviator</h3>
    </div>

    <div class="balance-card">
      <small>Balance</small>
      <h2 id="balanceAmount">0</h2>
    </div>
  </div>

  <div class="main-card">

    <button id="predictBtn">Generate Signal</button>

    <div id="predictionBox">

      <div class="pred-title">AVIATOR V2 SIGNALS</div>

      <div class="pred-line">
        <div class="label">TIME</div>
        <div class="value" id="timeRange">--:-- - --:--</div>
      </div>

      <div class="pred-line">
        <div class="label">CASHOUT</div>
        <div class="value" id="cashoutRange">0x - 0x</div>
      </div>

      <div class="pred-line">
        <div class="label">SAFE</div>
        <div class="value" id="safeValue">0x</div>
      </div>

      <div class="info">
        Losses may occur before signals appear. This system is designed for users with high deposit balance only.
      </div>

    </div>

  </div>
</div>

<script>

/* helpers */
const pad=n=>n<10?'0'+n:n;

const rand=(min,max)=>Math.random()*(max-min)+min;

/* elements */
const btn=document.getElementById("predictBtn");
const box=document.getElementById("predictionBox");

const timeRange=document.getElementById("timeRange");
const cashoutRange=document.getElementById("cashoutRange");
const safeValue=document.getElementById("safeValue");

/* generate */
btn.onclick=()=>{

  const now=new Date();

  // time 1 (2–3 min)
  const offset1=Math.floor(rand(2,4));
  const t1=new Date(now.getTime()+offset1*60000);

  // time 2 (+1 min)
  const t2=new Date(t1.getTime()+60000);

  const format=t=>pad(t.getHours())+":"+pad(t.getMinutes());

  // cashouts
  const c1=rand(4,6).toFixed(2);
  const c2=rand(9,15).toFixed(2);
  const safe=rand(3,4).toFixed(2);

  timeRange.textContent=`${format(t1)} - ${format(t2)}`;
  cashoutRange.textContent=`${c1}x - ${c2}x`;
  safeValue.textContent=`${safe}x`;

  box.style.display="block";
};

</script>

</body>
</html>
