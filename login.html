<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Magic Ai Bot - Login</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

<style>
    body {
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 20px;
    }
    h1 {
        font-family: 'UnifrakturCook', cursive;
        font-size: 32px;
        margin-bottom: 20px;
        color: red;
    }
    img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        margin-bottom: 20px;
    }
    input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        font-size: 16px;
    }
    button {
        background: red;
        font-family: 'UnifrakturCook', cursive;
        width: 95%;
        padding: 14px;
        border: none;
        font-size: 20px;
        color: black;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 10px;
    }

    /* NEW: Disabled style */
    button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    a {
        color: cyan;
    }
</style>
</head>

<body>

<h1>Dark Magic Ai Bot</h1>
<img src="dark.jpg" alt="Logo">

<input type="email" id="email" placeholder="𝗘𝗻𝘁𝗲𝗿 𝗘𝗺𝗮𝗶𝗹" required>
<input type="password" id="password" placeholder="𝗘𝗻𝘁𝗲𝗿 𝗣𝗮𝘀𝘀𝘄𝗼𝗿𝗱" required>

<!-- ADDED ID -->
<button id="loginBtn" onclick="login()">𝐋𝐨𝐠𝐢𝐧</button>

<p>𝗗𝗼𝗻𝘁 𝗵𝗮𝘃𝗲 𝗮𝗻 𝗮𝗰𝗰𝗼𝘂𝗻𝘁? <a href="index.html">𝗥𝗲𝗴𝗶𝘀𝘁𝗲𝗿 𝗡𝗼𝘄</a></p>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);

function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");

    // START LOADING
    btn.disabled = true;
    btn.innerText = "Logging in...";

    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(() => {
        alert("𝐋𝐨𝐠𝐢𝐧 𝐒𝐮𝐜𝐜𝐞𝐬𝐬𝐟𝐮𝐥");
        window.location.href = "maining.html";
    })
    .catch(error => {
        alert(error.message);

        // RESET BUTTON
        btn.disabled = false;
        btn.innerText = "𝐋𝐨𝐠𝐢𝐧";
    });
}
</script>

</body>
</html>
