<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Flip</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Orbitron', sans-serif;
    background-color: #000;
    color: #fff;
    text-align: center;
    padding: 20px;
}

h1 {
    font-size: 50px;
    font-weight: 800;
    color: gold;
    margin-bottom: 40px;
    letter-spacing: 3px;
    text-shadow: 0 0 15px #ffd700, 0 0 30px #ffcc00;
    animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
    0% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffcc00; transform: scale(1); }
    50% { text-shadow: 0 0 25px #fff200, 0 0 60px #ffcc00; transform: scale(1.05); }
    100% { text-shadow: 0 0 10px #ffd700, 0 0 20px #ffcc00; transform: scale(1); }
}

.coin-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 300px;
    perspective: 1000px;
}

.coin {
    width: 230px;
    height: 230px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
    transition: transform 0.2s;
    position: relative;
}

.progress-container {
    width: 80%;
    background-color: #333;
    border-radius: 10px;
    margin: 20px auto;
    height: 25px;
    display: none;
}

.progress-bar {
    width: 1%;
    height: 100%;
    background-color: gold;
    border-radius: 10px;
    transition: width 0.03s linear;
}

.predict-btn {
    background-color: gold;
    color: #000;
    border: none;
    padding: 15px 40px;
    font-size: 20px;
    border-radius: 35px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

.predict-btn:hover:enabled {
    background-color: #ffd700;
    transform: scale(1.05);
}

.predict-btn:disabled {
    background-color: gray;
    color: #222;
    cursor: not-allowed;
}

#balanceContainer {
    position: fixed;
    top: 10px;
    right: 15px;
    background: #1a1a1a;
    padding: 5px 12px;
    border-radius: 20px;
    color: #fff;
    font-weight: bold;
    z-index: 9999;
}
</style>
</head>
<body>

<div id="balanceContainer">
  <span id="balanceAmount">0</span> COINS
</div>

<h1>COIN FLIP</h1>

<div class="coin-container">
    <img id="coinImage" src="head.jpg" class="coin" alt="Coin">
</div>

<div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
</div>

<button class="predict-btn" id="predictBtn" onclick="predict()">Predict</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  projectId: "bets-d795d",
  storageBucket: "bets-d795d.appspot.com",
  messagingSenderId: "384386108287",
  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUserUid = null;

const balanceDisplay = document.getElementById("balanceAmount");

// Auth check
firebase.auth().onAuthStateChanged(user => {
  if (!user) { alert("Please login first"); return; }
  currentUserUid = user.uid;

  // Fetch balance once immediately
  db.ref("users/" + currentUserUid + "/balance").once("value").then(snap => {
    const val = snap.val();
    balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
  });

  // Real-time listener
  db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
    const val = snap.val();
    balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
  });
});

function predict() {
    if (!currentUserUid) return alert("User not logged in!");
    
    const btn = document.getElementById("predictBtn");
    const userBalanceRef = db.ref("users/" + currentUserUid + "/balance");

    // Deduct 1 coin safely
    userBalanceRef.transaction(current => {
        current = current || 0;
        if(current < 1){
            alert("Insufficient balance!");
            return; // abort
        }
        return current - 1;
    }, (err, committed, snapshot) => {
        if(committed){
            // Log transaction
            db.ref("users/" + currentUserUid + "/transactions").push({
                type: "bet",
                coins: -1,
                game: "Coin Flip",
                ref: "BET-" + Date.now(),
                time: Date.now(),
                uid: currentUserUid
            });
            runCoinFlip();
        }
    });
}

function runCoinFlip(){
    const btn = document.getElementById("predictBtn");
    const coin = document.getElementById("coinImage");
    const progressContainer = document.getElementById("progressContainer");
    const progressBar = document.getElementById("progressBar");

    btn.disabled = true;
    progressContainer.style.display = "block";
    progressBar.style.width = "1%";

    // Progress animation (3 seconds)
    let progress = 0;
    const progressInterval = setInterval(() => {
        progress++;
        progressBar.style.width = progress + "%";
        if(progress >= 100){
            clearInterval(progressInterval);
            spinCoin();
        }
    },30);

    function spinCoin() {
        const totalFlips = 30;
        let flipCount = 0;

        function doSpin() {
            if(flipCount < totalFlips){
                coin.src = "head.jpg";
                let speed;
                if(flipCount < totalFlips/3) speed = 200 - flipCount*10;
                else if(flipCount < 2*totalFlips/3) speed = 50;
                else speed = 50 + (flipCount - 2*totalFlips/3)*15;

                let rotation = flipCount * 180;
                coin.style.transform = `rotateY(${rotation}deg)`;

                flipCount++;
                setTimeout(doSpin, speed);
            } else {
                const finalSide = Math.random() < 0.5 ? "head.jpg" : "tail.jpg";
                coin.src = finalSide;
                coin.style.transform = "rotateY(0deg)";
                btn.disabled = false;
            }
        }

        doSpin();
    }
}
</script>

</body>
</html>
