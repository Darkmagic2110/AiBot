<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nova Mines</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:
  radial-gradient(circle at top,#1b2a52 0%,#0d1119 40%,#06080d 100%);
  min-height:100vh;
  color:white;
  padding:18px;
  overflow-x:hidden;
}

/* APP */

.app{
  width:100%;
  max-width:430px;
  margin:auto;
}

/* HEADER */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.logo-section{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:54px;
  height:54px;
  border-radius:18px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:26px;
  font-weight:800;
  box-shadow:0 0 30px rgba(0,153,255,.5);
}

.app-text h1{
  font-size:20px;
  font-weight:800;
}

.app-text p{
  font-size:12px;
  opacity:.6;
}

/* BALANCE */

.balance-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:10px 15px;
  text-align:right;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.balance-card small{
  font-size:11px;
  opacity:.6;
}

.balance-card h2{
  color:#00d9ff;
  font-size:20px;
  margin-top:3px;
}

/* MAIN CARD */

.main-card{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  border-radius:28px;
  padding:20px;
  box-shadow:0 15px 45px rgba(0,0,0,.45);
}

/* STATUS */

.status{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.live{
  background:#0cff8d22;
  border:1px solid #0cff8d55;
  color:#0cff8d;
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.session{
  font-size:12px;
  opacity:.6;
}

/* MODE */

.mode-toggle{
  display:flex;
  background:#101826;
  border-radius:18px;
  padding:5px;
  margin-bottom:18px;
}

.mode-btn{
  flex:1;
  padding:14px;
  border-radius:14px;
  text-align:center;
  cursor:pointer;
  transition:.25s;
  font-weight:600;
  color:#9ca3af;
}

.mode-btn.active{
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  box-shadow:0 8px 25px rgba(0,153,255,.45);
}

/* INFO BOX */

.info-box{
  background:#101826;
  border-radius:18px;
  padding:15px;
  margin-bottom:18px;
  border:1px solid rgba(255,255,255,.06);
}

.info-title{
  font-size:13px;
  opacity:.7;
  margin-bottom:6px;
}

.info-text{
  color:#00d9ff;
  font-size:14px;
  font-weight:600;
}

/* SELECT */

.select-box{
  margin-bottom:18px;
}

.select-box label{
  display:block;
  margin-bottom:8px;
  font-size:13px;
  opacity:.75;
}

select{
  width:100%;
  background:#101826;
  border:1px solid rgba(255,255,255,.08);
  color:white;
  padding:15px;
  border-radius:16px;
  outline:none;
  font-size:15px;
}

/* BOARD */

.board{
  background:#0d1523;
  padding:16px;
  border-radius:22px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.06);
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
}

.cell{
  aspect-ratio:1;
  border-radius:18px;
  background:
  linear-gradient(145deg,#162033,#0e1522);
  border:1px solid rgba(255,255,255,.05);
  position:relative;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:.25s;
}

.cell::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(
  145deg,
  rgba(255,255,255,.08),
  transparent);
}

.cell.active{
  background:
  linear-gradient(145deg,#00c6ff,#0072ff);
  box-shadow:0 0 25px rgba(0,153,255,.6);
  transform:scale(1.04);
}

/* STAR */

.star{
  font-size:30px;
  animation:pop .35s ease;
}

@keyframes pop{
  0%{
    transform:scale(0);
    opacity:0;
  }

  100%{
    transform:scale(1);
    opacity:1;
  }
}

/* BUTTON */

.predict-btn{
  width:100%;
  border:none;
  background:
  linear-gradient(135deg,#00c6ff,#0072ff);
  padding:17px;
  border-radius:18px;
  color:white;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
  box-shadow:0 10px 30px rgba(0,153,255,.35);
}

.predict-btn:hover{
  transform:translateY(-2px);
}

.predict-btn:active{
  transform:scale(.98);
}

/* LOADING */

.loading{
  opacity:.6;
  pointer-events:none;
}

/* FOOTER */

.footer{
  text-align:center;
  margin-top:20px;
  opacity:.45;
  font-size:12px;
}

</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->

  <div class="topbar">

    <div class="logo-section">

      <div class="logo">
        N
      </div>

      <div class="app-text">
        <h1>Nova Mines</h1>
        <p>Smart Gaming Dashboard</p>
      </div>

    </div>

    <div class="balance-card">
      <small>AVAILABLE COINS</small>
      <h2><span id="balanceAmount">0</span></h2>
    </div>

  </div>

  <!-- MAIN -->

  <div class="main-card">

    <!-- STATUS -->

    <div class="status">
      <div class="live">● LIVE SESSION</div>
      <div class="session" id="sessionId"></div>
    </div>

    <!-- MODE -->

    <div class="mode-toggle">
      <div class="mode-btn active" id="regularBtn">
        Regular
      </div>

      <div class="mode-btn" id="premiumBtn">
        Premium
      </div>
    </div>

    <!-- INFO -->

    <div class="info-box">
      <div class="info-title">CURRENT MODE</div>
      <div class="info-text" id="modeInfo">
        Regular Scan Active
      </div>
    </div>

    <!-- SELECT -->

    <div class="select-box">
      <label>Select Bomb Difficulty</label>

      <select id="bombChoice">
        <option value="1">1 Bomb</option>
        <option value="3">3 Bombs</option>
        <option value="5">5 Bombs</option>
        <option value="7">7 Bombs</option>
      </select>
    </div>

    <!-- BOARD -->

    <div class="board">
      <div class="grid" id="grid"></div>
    </div>

    <!-- BUTTON -->

    <button class="predict-btn" id="predictBtn">
      Generate Signal
    </button>

  </div>

  <div class="footer">
    Nova AI Gaming Interface © 2026
  </div>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

/* ELEMENTS */

const grid = document.getElementById("grid");
const balanceDisplay = document.getElementById("balanceAmount");

const regularBtn = document.getElementById("regularBtn");
const premiumBtn = document.getElementById("premiumBtn");

const modeInfo = document.getElementById("modeInfo");
const predictBtn = document.getElementById("predictBtn");

/* SESSION */

document.getElementById("sessionId").innerText =
"SESSION #" + Math.floor(Math.random() * 99999);

/* MODE */

let mode = "regular";

regularBtn.onclick = () => {

  mode = "regular";

  regularBtn.classList.add("active");
  premiumBtn.classList.remove("active");

  modeInfo.innerText =
  "Regular Scan Active";

};

premiumBtn.onclick = () => {

  mode = "premium";

  premiumBtn.classList.add("active");
  regularBtn.classList.remove("active");

  modeInfo.innerText =
  "Premium AI Engine Enabled";

};

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",

  authDomain: "bets-d795d.firebaseapp.com",

  projectId: "bets-d795d",

  storageBucket: "bets-d795d.appspot.com",

  messagingSenderId: "384386108287",

  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",

  databaseURL:
  "https://bets-d795d-default-rtdb.firebaseio.com"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let currentUserUid = null;
let currentUserEmail = null;

/* AUTH */

firebase.auth().onAuthStateChanged(user => {

  if(!user){

    alert("Please login first");

    return;

  }

  currentUserUid = user.uid;
  currentUserEmail = user.email;

  db.ref("users/" + currentUserUid + "/balance")
  .on("value", snap => {

    balanceDisplay.innerText =
    snap.val() || 0;

  });

});

/* PREDICT */

predictBtn.onclick = () => {

  predict();

};

function predict(){

  if(!currentUserUid){

    alert("User not logged in!");

    return;

  }

  const cost =
  mode === "premium" ? 2 : 1;

  const balanceRef =
  db.ref("users/" + currentUserUid + "/balance");

  balanceRef.transaction(current => {

    current = current || 0;

    if(current < cost){

      alert("Insufficient balance!");

      return;

    }

    return current - cost;

  }, (err, committed) => {

    if(committed){

      const tx = {

        type:"bet",
        coins:-cost,
        amount:cost,
        game:"Mines",
        ref:"BET-" + Date.now(),
        time:Date.now(),
        email:currentUserEmail,
        uid:currentUserUid

      };

      db.ref(
      "users/" +
      currentUserUid +
      "/transactions"
      ).push(tx);

      db.ref("transactions").push(tx);

      runPrediction();

    }

  });

}

/* PREDICTION */

function runPrediction(){

  predictBtn.classList.add("loading");
  predictBtn.innerText = "Analyzing...";

  const cells = [...grid.children];

  cells.forEach(cell => {

    cell.innerHTML = "";
    cell.classList.remove("active");

  });

  setTimeout(() => {

    const bombs =
    parseInt(
    document.getElementById("bombChoice").value
    );

    const isPremium =
    mode === "premium";

    let stars = 0;

    if(!isPremium){

      if(bombs === 1)
      stars = getRandom(5,10);

      else if(bombs === 3)
      stars = getRandom(5,7);

      else if(bombs === 5)
      stars = getRandom(3,5);

      else if(bombs === 7)
      stars = getRandom(2,4);

    }else{

      if(bombs === 1)
      stars = getRandom(5,6);

      else if(bombs === 3)
      stars = getRandom(3,4);

      else if(bombs === 5)
      stars = getRandom(2,3);

      else if(bombs === 7)
      stars = getRandom(1,2);

    }

    let used = new Set();

    while(
      used.size < stars
    ){

      used.add(
      Math.floor(
      Math.random() * cells.length
      ));

    }

    let delay = 0;

    used.forEach(i => {

      setTimeout(() => {

        const star =
        document.createElement("div");

        star.className = "star";
        star.innerText = "⭐";

        cells[i].classList.add("active");

        cells[i].appendChild(star);

      }, delay);

      delay += 120;

    });

    predictBtn.classList.remove("loading");
    predictBtn.innerText = "Generate Signal";

  }, 1500);

}

/* RANDOM */

function getRandom(min,max){

  return Math.floor(
  Math.random() * (max - min + 1)
  ) + min;

}

/* CREATE GRID */

for(let i=0;i<25;i++){

  const cell =
  document.createElement("div");

  cell.className = "cell";

  grid.appendChild(cell);

}

</script>

</body>
</html>
