<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>𝐃𝐀𝐑𝐊 𝐌𝐀𝐆𝐈𝐂 𝐌𝐈𝐍𝐄𝐒 𝐁𝐎𝐓</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
  body { background:#0e1218;color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px; }

  .blinking-text { font-size:20px;font-weight:bold;margin-bottom:20px;animation:blinkColor 2s infinite ease-in-out; }
  @keyframes blinkColor { 0% { color: #00f; } 50% { color: #fff; } 100% { color: #00f; } }

  .board { width:100%; max-width:400px; background:#1a1f2b; border-radius:16px; padding:12px; box-shadow:0 0 10px rgba(0,255,255,0.2); margin-bottom:20px; }
  .grid { display:grid; grid-template-columns:repeat(5,60px); gap:8px; }

  .cell { 
    width:60px; 
    height:60px; 
    background:url('https://i.ibb.co/4R4WT7v6/1000023083.png') center/cover; 
    border-radius:8px; 
    cursor:pointer; 
    transition:transform .1s; 
    position: relative; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    overflow: visible; /* stars now visible */
  }

  .star {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 32px;
    animation: pop 0.3s forwards;
    pointer-events: none;
  }

  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .predict-btn { background:linear-gradient(90deg,#009fff,#00f5ff); color:#000; border:none; padding:14px 24px; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:12px; }
  .bomb-select { margin-bottom:15px; font-size:16px; font-weight:bold; }

  #balanceContainer { position:fixed; top:10px; right:15px; background:#1a1a1a; padding:5px 12px; border-radius:20px; color:#fff; font-weight:bold; z-index:9999; }
</style>
</head>
<body>

<div id="balanceContainer">
  <span id="balanceAmount">0</span> COINS
</div>

<div class="blinking-text">𝐃𝐀𝐑𝐊 𝐌𝐀𝐆𝐈𝐂 𝐌𝐈𝐍𝐄𝐒 𝐁𝐎𝐓</div>

<select id="bombChoice" class="bomb-select">
  <option value="1">1 Bomb</option>
  <option value="3">3 Bombs</option>
  <option value="5">5 Bombs</option>
  <option value="7">7 Bombs</option>
</select>

<div class="board">
  <div class="grid" id="grid"></div>
</div>

<button class="predict-btn" onclick="predict()">Predict</button>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const grid = document.getElementById('grid');
const balanceDisplay = document.getElementById("balanceAmount");

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  projectId: "bets-d795d",
  storageBucket: "bets-d795d.appspot.com",
  messagingSenderId: "384386108287",
  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUserUid = null;

// Auth check
firebase.auth().onAuthStateChanged(user => {
  if (!user) { alert("Please login first"); return; }
  currentUserUid = user.uid;
  
  db.ref("users/" + currentUserUid + "/balance").once("value").then(snap => {
    const val = snap.val();
    balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
  });

  db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
    const val = snap.val();
    balanceDisplay.innerText = val != null ? Math.floor(val) : 0;
  });
});

// Predict button
function predict() {
  if (!currentUserUid) return alert("User not logged in!");

  const userBalanceRef = db.ref("users/" + currentUserUid + "/balance");
  userBalanceRef.transaction(current => {
    current = current || 0;
    if (current < 1) { alert("Insufficient balance!"); return; }
    return current - 1;
  }, (err, committed, snapshot) => {
    if (committed) runGame();
  });
}

// Game logic
function runGame() {
  const cells = [...grid.children];

  // Remove old stars
  cells.forEach(c => {
    const oldStars = c.querySelectorAll('.star');
    oldStars.forEach(s => s.remove());
  });

  let bombs = parseInt(document.getElementById("bombChoice").value);
  let stars = 0;

  if (bombs === 7) stars = getRandom(3, 6);
  if (bombs === 5) stars = getRandom(5, 7);
  if (bombs === 3) stars = getRandom(8, 11);
  if (bombs === 1) stars = getRandom(10, 15);

  let used = new Set();
  while (used.size < stars) {
    let r = Math.floor(Math.random() * cells.length);
    used.add(r);
  }

  // Add ⭐ stars
  used.forEach(i => {
    const star = document.createElement('div');
    star.className = 'star';
    star.innerText = '⭐';
    cells[i].appendChild(star);
  });
}

function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// Build grid
for (let i = 0; i < 25; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  grid.appendChild(cell);
}
</script>

</body>
</html>
