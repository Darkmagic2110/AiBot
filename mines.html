<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>𝐃𝐀𝐑𝐊 𝐌𝐀𝐆𝐈𝐂 𝐌𝐈𝐍𝐄𝐒 𝐁𝐎𝐓</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
  body { background:#0e1218;color:#fff;display:flex;flex-direction:column;align-items:center;padding:20px; }

  .blinking-text { font-size:20px;font-weight:bold;margin-bottom:10px;animation:blinkColor 2s infinite ease-in-out; }
  @keyframes blinkColor { 0% { color: #00f; } 50% { color: #fff; } 100% { color: #00f; } }

  .board { width:100%; max-width:400px; background:#1a1f2b; border-radius:16px; padding:12px; box-shadow:0 0 10px rgba(0,255,255,0.2); margin-bottom:20px; }
  .grid { display:grid; grid-template-columns:repeat(5,60px); gap:8px; }

  .cell { 
    width:60px; 
    height:60px; 
    background:url('https://i.ibb.co/4R4WT7v6/1000023083.png') center/cover; 
    border-radius:8px; 
    cursor:pointer; 
    transition:transform .1s; 
    position: relative; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    overflow: visible;
  }

  .star {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 32px;
    animation: pop 0.3s forwards;
    pointer-events: none;
  }

  @keyframes pop {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  .predict-btn { background:linear-gradient(90deg,#009fff,#00f5ff); color:#000; border:none; padding:14px 24px; border-radius:12px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:12px; }
  .bomb-select { margin-bottom:10px; font-size:16px; font-weight:bold; }

  #balanceContainer { position:fixed; top:10px; right:15px; background:#1a1a1a; padding:5px 12px; border-radius:20px; color:#fff; font-weight:bold; z-index:9999; }
</style>
</head>
<body>

<div id="balanceContainer">
  <span id="balanceAmount">0</span> COINS
</div>

<div class="blinking-text">𝐃𝐀𝐑𝐊 𝐌𝐀𝐆𝐈𝐂 𝐌𝐈𝐍𝐄𝐒 𝐁𝐎𝐓</div>

<!-- MODE INFO -->
<div id="modeInfo" style="margin-bottom:10px;font-weight:bold;color:#00f5ff;">
  You are currently using Regular Prediction
</div>

<!-- MODE SELECT -->
<select id="modeSelect" class="bomb-select">
  <option value="regular">Regular Mode</option>
  <option value="premium">Premium Mode</option>
</select>

<select id="bombChoice" class="bomb-select">
  <option value="1">1 Bomb</option>
  <option value="3">3 Bombs</option>
  <option value="5">5 Bombs</option>
  <option value="7">7 Bombs</option>
</select>

<div class="board">
  <div class="grid" id="grid"></div>
</div>

<button class="predict-btn" onclick="predict()">Predict</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const grid = document.getElementById('grid');
const balanceDisplay = document.getElementById("balanceAmount");
const modeSelect = document.getElementById("modeSelect");
const modeInfo = document.getElementById("modeInfo");

const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  projectId: "bets-d795d",
  storageBucket: "bets-d795d.appspot.com",
  messagingSenderId: "384386108287",
  appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let currentUserUid = null;
let currentUserEmail = null;

firebase.auth().onAuthStateChanged(user => {
  if (!user) { alert("Please login first"); return; }
  currentUserUid = user.uid;
  currentUserEmail = user.email;
  
  db.ref("users/" + currentUserUid + "/balance").once("value").then(snap => {
    balanceDisplay.innerText = snap.val() || 0;
  });

  db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
    balanceDisplay.innerText = snap.val() || 0;
  });
});

// MODE TEXT UPDATE
modeSelect.addEventListener("change", () => {
  if (modeSelect.value === "premium") {
    modeInfo.innerText = "Premium Mode: Each prediction costs 2 coins";
  } else {
    modeInfo.innerText = "You are currently using Regular Prediction";
  }
});

function predict() {
  if (!currentUserUid) return alert("User not logged in!");

  const isPremium = modeSelect.value === "premium";
  const cost = isPremium ? 2 : 1;

  const userBalanceRef = db.ref("users/" + currentUserUid + "/balance");

  userBalanceRef.transaction(current => {
    current = current || 0;
    if (current < cost) { alert("Insufficient balance!"); return; }
    return current - cost;
  }, (err, committed, snapshot) => {
    if (committed) {

      const tx = {
        type: "bet",
        coins: -cost,
        amount: cost,
        game: "Mines",
        ref: "BET-" + Date.now(),
        time: Date.now(),
        email: currentUserEmail,
        uid: currentUserUid
      };

      db.ref("users/" + currentUserUid + "/transactions").push(tx);
      db.ref("transactions").push(tx);

      runGame();
    }
  });
}

function runGame() {
  const cells = [...grid.children];
  cells.forEach(c => c.querySelectorAll('.star').forEach(s => s.remove()));

  const bombs = parseInt(document.getElementById("bombChoice").value);
  const isPremium = modeSelect.value === "premium";
  let stars = 0;

  if (!isPremium) {
    if (bombs === 1) stars = getRandom(5, 10);
    else if (bombs === 3) stars = getRandom(5, 7);
    else if (bombs === 5) stars = getRandom(3, 5);
    else if (bombs === 7) stars = getRandom(2, 4);
  } else {
    // PREMIUM LOGIC (YOUR EXACT RULES)
    if (bombs === 1) stars = getRandom(5, 6);
    else if (bombs === 3) stars = getRandom(3, 4);
    else if (bombs === 5) stars = getRandom(2, 3);
    else if (bombs === 7) stars = getRandom(1, 2);
  }

  let used = new Set();
  while (used.size < stars) used.add(Math.floor(Math.random() * cells.length));

  used.forEach(i => {
    const star = document.createElement('div');
    star.className = 'star';
    star.innerText = '⭐';
    cells[i].appendChild(star);
  });
}

function getRandom(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

for (let i = 0; i < 25; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  grid.appendChild(cell);
}
</script>

</body>
</html>
