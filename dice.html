<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dice Pro</title>

<style>
body{
margin:0;
font-family:Segoe UI,sans-serif;
background:linear-gradient(135deg,#001a00,#002b1f);
color:#fff;
text-align:center;
}

#balanceContainer{
position:fixed;
top:10px;
right:12px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
padding:6px 14px;
border-radius:20px;
font-weight:700;
box-shadow:0 0 12px #00ff88;
}

.header{
font-size:50px;
font-weight:900;
letter-spacing:8px;
margin-top:35px;
opacity:.9;
}

#numberDisplay{
font-size:110px;
font-weight:900;
margin:20px 0;
color:#00ffcc;
text-shadow:0 0 25px #00ffcc;
}

.mode-box{
display:flex;
justify-content:center;
width:220px;
margin:10px auto;
background:#111;
border-radius:30px;
padding:4px;
}

.mode-btn{
flex:1;
padding:8px;
border-radius:25px;
cursor:pointer;
font-weight:700;
transition:.25s;
color:#aaa;
}

.mode-btn.active{
background:#00ff88;
color:#000;
}

#modeText{
font-size:13px;
opacity:.7;
margin-bottom:10px;
}

.option-box{
display:flex;
justify-content:center;
gap:15px;
margin-top:25px;
}

.btn{
padding:12px 22px;
border-radius:12px;
border:2px solid #00ff88;
background:transparent;
color:#fff;
font-weight:800;
cursor:pointer;
transition:.2s;
}

.btn.active-choice,
.btn:hover{
background:#00ff88;
color:#000;
}

.predict-btn{
margin-top:35px;
padding:15px 30px;
font-size:20px;
font-weight:900;
border:none;
border-radius:14px;
background:#00ff88;
color:#000;
cursor:pointer;
box-shadow:0 0 15px #00ff88;
}

#toast{
position:fixed;
bottom:50px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:10px 16px;
border-radius:10px;
visibility:hidden;
font-size:13px;
}
</style>
</head>

<body>

<div id="balanceContainer"><span id="balanceAmount">0</span> COINS</div>

<div class="header">DICE</div>

<div class="mode-box">
<div class="mode-btn active" id="regularBtn">Regular</div>
<div class="mode-btn" id="premiumBtn">Premium</div>
</div>

<div id="modeText">Regular Mode Active</div>

<div id="numberDisplay">00</div>

<div class="option-box">
<button id="overBtn" class="btn">OVER</button>
<button id="underBtn" class="btn">UNDER</button>
</div>

<button class="predict-btn" onclick="predict()">PREDICT</button>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let choice="",mode="regular",anim=null;

const balanceDisplay=document.getElementById("balanceAmount"),
regularBtn=document.getElementById("regularBtn"),
premiumBtn=document.getElementById("premiumBtn"),
modeText=document.getElementById("modeText"),
overBtn=document.getElementById("overBtn"),
underBtn=document.getElementById("underBtn"),
display=document.getElementById("numberDisplay"),
toast=document.getElementById("toast");

regularBtn.onclick=()=>{
mode="regular";
regularBtn.classList.add("active");
premiumBtn.classList.remove("active");
modeText.innerText="Regular Mode Active";
};

premiumBtn.onclick=()=>{
mode="premium";
premiumBtn.classList.add("active");
regularBtn.classList.remove("active");
modeText.innerText="Premium Mode (2 coins)";
};

overBtn.onclick=()=>{
choice="over";
overBtn.classList.add("active-choice");
underBtn.classList.remove("active-choice");
show("OVER selected");
};

underBtn.onclick=()=>{
choice="under";
underBtn.classList.add("active-choice");
overBtn.classList.remove("active-choice");
show("UNDER selected");
};

function show(msg){
toast.innerText=msg;
toast.style.visibility="visible";
setTimeout(()=>toast.style.visibility="hidden",1200);
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

// firebase
const firebaseConfig={
apiKey:"AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain:"bets-d795d.firebaseapp.com",
databaseURL:"https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
let uid=null;

firebase.auth().onAuthStateChanged(u=>{
if(!u)return alert("Login first");
uid=u.uid;
db.ref("users/"+uid+"/balance").on("value",s=>balanceDisplay.innerText=s.val()||0);
});

function predict(){
if(!uid)return;
if(!choice)return show("Select option");

const cost=mode==="premium"?2:1;

db.ref("users/"+uid+"/balance").transaction(c=>{
c=c||0;
if(c<cost){show("No balance");return;}
return c-cost;
},(e,ok)=>{
if(!ok)return;

if(anim)clearInterval(anim);

anim=setInterval(()=>{
display.innerText=Math.floor(Math.random()*99).toString().padStart(2,'0');
},60);

setTimeout(()=>{
clearInterval(anim);

display.innerText=mode==="premium"
?(choice==="over"?rand(15,35):rand(70,85))
:(choice==="over"?rand(35,55):rand(55,75));

show("Done");
},2000);
});
}
</script>

</body>
</html>
