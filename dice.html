<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICE</title>

<style>
body {
    background: linear-gradient(135deg, #001a00, #003300);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    padding-top: 40px;
}

#balanceContainer {
    position: fixed;
    top: 10px;
    right: 15px;
    background: #111;
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: bold;
    box-shadow: 0 0 10px #00ff88;
}

.dice-header {
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 12px;
    margin-bottom: 20px;
}

#numberDisplay {
    font-size: 110px;
    font-weight: 900;
    margin-top: 20px;
    color: #00ffcc;
    text-shadow: 0 0 20px #00ffcc;
}

/* MODE SWITCH */
.mode-box {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
    background: #111;
    border-radius: 30px;
    width: 220px;
    margin-left: auto;
    margin-right: auto;
    padding: 4px;
}

.mode-btn {
    flex: 1;
    padding: 8px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

.mode-btn.active {
    background: #00ff88;
    color: black;
}

#modeText {
    font-size: 13px;
    margin-bottom: 10px;
    opacity: 0.8;
}

.option-box {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.btn {
    padding: 14px 26px;
    font-size: 20px;
    border-radius: 12px;
    border: 2px solid #00ff88;
    background: transparent;
    color: white;
    font-weight: 800;
    cursor: pointer;
    transition: .3s;
}

/* 🔥 persistent glow */
.btn.active-choice {
    background: #00ff88;
    color: black;
    box-shadow: 0 0 15px #00ff88, 0 0 30px #00ff88;
}

.btn:hover {
    background: #00ff88;
    color: black;
}

.predict-btn {
    margin-top: 40px;
    padding: 16px 36px;
    font-size: 24px;
    font-weight: 900;
    background: #00ff88;
    color: black;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 0 15px #00ff88;
}

#toast {
    visibility: hidden;
    background: black;
    padding: 10px 16px;
    border-radius: 8px;
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="balanceContainer">
  <span id="balanceAmount">0</span> COINS
</div>

<div class="dice-header">DICE</div>

<div class="mode-box">
  <div class="mode-btn active" id="regularBtn">Regular</div>
  <div class="mode-btn" id="premiumBtn">Premium</div>
</div>
<div id="modeText">Regular Mode Active</div>

<div id="numberDisplay">00</div>

<div class="option-box">
    <button id="overBtn" class="btn">OVER</button>
    <button id="underBtn" class="btn">UNDER</button>
</div>

<button class="predict-btn" onclick="predict()">PREDICT</button>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
let choice = "";
let mode = "regular";
let anim = null; // 🔥 prevent multiple animations

const balanceDisplay = document.getElementById("balanceAmount");
const regularBtn = document.getElementById("regularBtn");
const premiumBtn = document.getElementById("premiumBtn");
const modeText = document.getElementById("modeText");

// mode switch
regularBtn.onclick = () => {
    mode = "regular";
    regularBtn.classList.add("active");
    premiumBtn.classList.remove("active");
    modeText.innerText = "Regular Mode Active";
};

premiumBtn.onclick = () => {
    mode = "premium";
    premiumBtn.classList.add("active");
    regularBtn.classList.remove("active");
    modeText.innerText = "Premium Mode (2 coins)";
};

// firebase
const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUserUid = null;

firebase.auth().onAuthStateChanged(user => {
    if (!user) return alert("Login first");
    currentUserUid = user.uid;

    db.ref("users/" + currentUserUid + "/balance").on("value", snap => {
        balanceDisplay.innerText = snap.val() || 0;
    });
});

function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.visibility = "visible";
    setTimeout(()=>toast.style.visibility="hidden",1500);
}

// 🔥 keep glow (no removal)
overBtn.onclick = function () {
    choice = "over";
    this.classList.add("active-choice");
    showToast("OVER selected");
};

underBtn.onclick = function () {
    choice = "under";
    this.classList.add("active-choice");
    showToast("UNDER selected");
};

// random helper
function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

function predict() {
    if (!currentUserUid) return;
    if (!choice) return showToast("Select option");

    const cost = mode === "premium" ? 2 : 1;
    const ref = db.ref("users/" + currentUserUid + "/balance");

    ref.transaction(current => {
        current = current || 0;
        if (current < cost) { showToast("No balance"); return; }
        return current - cost;
    }, (err, committed) => {
        if (!committed) return;

        db.ref("users/" + currentUserUid + "/transactions").push({
            coins: -cost,
            game: "Dice",
            time: Date.now()
        });

        const display = document.getElementById("numberDisplay");

        // 🔥 clear old animation if exists
        if (anim) clearInterval(anim);

        // animation
        anim = setInterval(() => {
            display.innerText = Math.floor(Math.random()*99)
                .toString().padStart(2,'0');
        },70);

        setTimeout(() => {
            clearInterval(anim);
            anim = null;

            let result;

            if (mode === "premium") {
                result = (choice === "over") ? rand(15,35) : rand(70,85);
            } else {
                result = (choice === "over") ? rand(35,55) : rand(55,75);
            }

            display.innerText = result.toString().padStart(2,'0');
            showToast("Done");

        },2600);
    });
}
</script>

</body>
</html>
