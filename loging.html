<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dark Magic AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at top, #000000, #1a0000);
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.container {
    width: 360px;
    padding: 30px;
    border-radius: 15px;
    background: rgba(255, 0, 0, 0.05);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
    border: 1px solid rgba(255,0,0,0.2);
    animation: fadeIn 0.8s ease;
}

h1 {
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    color: #ff1a1a;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    background: rgba(255,0,0,0.08);
    color: white;
    outline: none;
}

input::placeholder {
    color: #ff9999;
}

.checkbox {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-top: 5px;
}

.checkbox input {
    margin-right: 5px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.error {
    color: #ff4d4d;
    font-size: 13px;
    text-align: center;
    margin-top: 10px;
}

.loader {
    display: none;
    text-align: center;
    margin-top: 10px;
    color: #ff6666;
}

a {
    color: #ff6666;
    font-size: 13px;
    cursor: pointer;
}

.bottom-text {
    text-align: center;
    margin-top: 15px;
    font-size: 13px;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Login</h1>

    <input type="email" id="email" placeholder="Enter Email">
    <input type="password" id="password" placeholder="Enter Password">

    <div class="checkbox">
        <label><input type="checkbox" id="remember"> Remember Me</label>
        <a onclick="forgotPassword()">Forgot Password?</a>
    </div>

    <button onclick="login()">Login</button>

    <div class="loader" id="loader">Logging in...</div>
    <div class="error" id="error"></div>

    <div class="bottom-text">
        Don’t have an account? <a href="index.html">Register</a>
    </div>
</div>

<script>
// 🔥 FIREBASE CONFIG (UNCHANGED)
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

// 🔥 LOAD SAVED LOGIN
window.onload = function() {
    let savedEmail = localStorage.getItem("rememberEmail");
    let savedPass = localStorage.getItem("rememberPass");

    if (savedEmail && savedPass) {
        document.getElementById("email").value = savedEmail;
        document.getElementById("password").value = savedPass;
        document.getElementById("remember").checked = true;
    }
};

// 🔥 LOGIN FUNCTION (UNCHANGED CORE)
function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    const remember = document.getElementById("remember").checked;
    const loader = document.getElementById("loader");
    const error = document.getElementById("error");

    error.innerText = "";
    loader.style.display = "block";

    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(() => {
        loader.style.display = "none";

        // 🔥 REMEMBER ME
        if (remember) {
            localStorage.setItem("rememberEmail", email);
            localStorage.setItem("rememberPass", pass);
        } else {
            localStorage.removeItem("rememberEmail");
            localStorage.removeItem("rememberPass");
        }

        alert("Login Successful");
        window.location.href = "maining.html";
    })
    .catch(errorMsg => {
        loader.style.display = "none";
        error.innerText = errorMsg.message;
    });
}

// 🔥 FORGOT PASSWORD
function forgotPassword() {
    let confirmAction = confirm("Contact customer support?");

    if (confirmAction) {
        let links = [
            "https://t.me/dark_magiks",
            "https://t.me/dark_maggik"
        ];

        let randomLink = links[Math.floor(Math.random() * links.length)];
        window.location.href = randomLink;
    }
}
</script>

</body>
</html>
