<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
    padding: 20px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px rgba(255,0,0,0.3);
}

h2 {
    color: red;
    text-align: center;
}

button {
    width: 100%;
    padding: 12px;
    background: red;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
    margin-top: 10px;
    cursor: pointer;
}

.user {
    padding: 10px;
    border-bottom: 1px solid #222;
    font-size: 14px;
}
</style>
</head>

<body>

<h2>Affiliate Dashboard</h2>

<div class="card">
    <div><b>Your Referral Link:</b></div>
    <div id="refLink">Loading...</div>
    <button onclick="copyLink()">Copy Link</button>
</div>

<div class="card">
    <div><b>Affiliate Balance:</b></div>
    <div id="balance">₦0</div>
</div>

<div class="card">
    <div><b>Total Referred Users:</b></div>
    <div id="totalRef">0</div>
</div>

<div class="card">
    <div><b>Total Earned:</b></div>
    <div id="totalEarned">₦0</div>
</div>

<div class="card">
    <div><b>Referred Users</b></div>
    <div id="userList"></div>
</div>

<div class="card">
    <button onclick="withdraw()">Withdraw</button>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let userUID = null;
let refCode = null;

/* ================= LOGIN ================= */
firebase.auth().onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    userUID = user.uid;

    db.ref("users/" + userUID).once("value").then(snap => {
        const data = snap.val() || {};

        refCode = data.refCode || "";

        const link = window.location.origin + "/index.html?ref=" + refCode;
        document.getElementById("refLink").innerText = link;

        loadDashboard();
    });
});

/* ================= DASHBOARD ================= */
function loadDashboard() {

    // ✅ TOTAL EARNED (FIXED PATH)
    db.ref("users/" + userUID + "/totalEarned").on("value", snap => {
        document.getElementById("totalEarned").innerText =
            "₦" + (snap.val() || 0).toFixed(2);
    });

    // ✅ AVAILABLE BALANCE
    db.ref("users/" + userUID + "/affiliateBalance").on("value", snap => {
        document.getElementById("balance").innerText =
            "₦" + (snap.val() || 0).toFixed(2);
    });

    // ✅ TOTAL REFERRALS (SAFE + FIXED)
    db.ref("users").once("value").then(snap => {

        let count = 0;
        let list = [];

        snap.forEach(child => {
            const u = child.val() || {};

            if (u.referredBy && refCode && u.referredBy === refCode) {
                count++;

                list.push({
                    name: u.name,
                    email: u.email,
                    time: u.createdAt
                });
            }
        });

        document.getElementById("totalRef").innerText = count;

        renderUsers(list);
    });
}

/* ================= USERS LIST ================= */
function renderUsers(list) {
    const box = document.getElementById("userList");
    box.innerHTML = "";

    if (!list.length) {
        box.innerHTML = "<div>No referrals yet</div>";
        return;
    }

    list.forEach(u => {
        const div = document.createElement("div");
        div.className = "user";

        const date = u.time
            ? new Date(u.time).toLocaleDateString()
            : "N/A";

        div.innerHTML = `
            <b>${u.name || "User"}</b><br>
            ${u.email}<br>
            <small>Joined: ${date}</small>
        `;

        box.appendChild(div);
    });
}

/* ================= COPY LINK ================= */
function copyLink() {
    navigator.clipboard.writeText(
        document.getElementById("refLink").innerText
    );
    alert("Copied!");
}

/* ================= WITHDRAW ================= */
function withdraw() {

    db.ref("users/" + userUID + "/affiliateBalance").once("value").then(snap => {

        const bal = snap.val() || 0;

        if (bal < 2000) {
            alert("Minimum withdrawal is ₦2000");
            return;
        }

        if (confirm("Withdraw ₦" + bal + " ?")) {

            db.ref("withdrawals").push({
                userId: userUID,
                amount: bal,
                status: "pending",
                time: Date.now()
            });

            db.ref("users/" + userUID + "/affiliateBalance").set(0);

            alert("Withdrawal request sent!");
        }
    });
}
</script>

</body>
</html>
