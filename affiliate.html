<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h2 {
    text-align: center;
    color: red;
    margin-bottom: 20px;
    font-weight: 600;
}

/* CARD DESIGN */
.card {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid #222;
}

/* STATS */
.stat {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 14px;
}

.stat span:last-child {
    color: lime;
    font-weight: bold;
}

/* REF LINK BOX */
#refLink {
    word-break: break-all;
    font-size: 13px;
    color: cyan;
    background: #0a0a0a;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    display: block;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: red;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    opacity: 0.85;
}

/* USER LIST */
.user {
    background: #1a1a1a;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    font-size: 13px;
    border: 1px solid #222;
}

/* TOAST */
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: lime;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    z-index: 99999;
    opacity: 0;
    transition: opacity 0.3s;
}

#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}

/* POPUP */
#popup {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 999;
}

#popupBox {
    background: #111;
    margin: 25% auto;
    padding: 20px;
    width: 85%;
    border-radius: 12px;
    text-align: center;
    border: 1px solid #222;
}
</style>
</head>

<body>

<h2>Affiliate Dashboard</h2>

<div class="card">
    <b>Your Referral Link:</b>
    <div id="refLink">Loading...</div>
    <button onclick="copyLink()">Copy Link</button>
</div>

<div class="card">
    <b>Affiliate Balance:</b>
    <div id="balance">₦0</div>
</div>

<div class="card">
    <b>Total Referred Users:</b>
    <div id="totalRef">0</div>
</div>

<div class="card">
    <b>Total Earned:</b>
    <div id="totalEarned">₦0</div>
</div>

<div class="card">
    <b>Referred Users</b>
    <div id="userList"></div>
</div>

<div class="card">
    <button onclick="withdraw()">Withdraw</button>
</div>

<!-- WITHDRAW FORM -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <h3 style="color:red;text-align:center;">Withdrawal Form</h3>

    <input id="accNumber" placeholder="Account Number">
    <input id="bankName" placeholder="Bank Name (e.g OPAY)">
    <input id="accName" placeholder="Account Name">
    <input id="withdrawAmount" placeholder="Amount (Min ₦5000)">

    <button onclick="submitWithdraw()">Continue</button>
  </div>
</div>

<!-- CONFIRMATION -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h3 style="color:red;text-align:center;">Confirm Withdrawal</h3>

    <p id="confirmText">I have a pending withdrawal</p>

    <button onclick="copyAndRedirect()">Copy Text & Continue</button>
  </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let userUID = null;
let refCode = null;
let withdrawData = {};

/* LOGIN */
firebase.auth().onAuthStateChanged(user => {
    if (!user) return window.location.href = "login.html";

    userUID = user.uid;

    db.ref("users/" + userUID).once("value").then(snap => {
        const data = snap.val() || {};

        refCode = data.refCode || "";

        document.getElementById("refLink").innerText =
            window.location.origin + "/index.html?ref=" + refCode;

        loadDashboard();
    });
});

/* DASHBOARD */
function loadDashboard() {

    db.ref("users/" + userUID + "/affiliateBalance").on("value", snap => {
        document.getElementById("balance").innerText =
            "₦" + (snap.val() || 0).toFixed(2);
    });

    db.ref("users/" + userUID + "/totalEarned").on("value", snap => {
        document.getElementById("totalEarned").innerText =
            "₦" + (snap.val() || 0).toFixed(2);
    });

    db.ref("users").once("value").then(snap => {
        let count = 0;
        let list = [];

        snap.forEach(child => {
            const u = child.val() || {};
            if (u.referredBy === refCode) {
                count++;
                list.push(u);
            }
        });

        document.getElementById("totalRef").innerText = count;

        const box = document.getElementById("userList");
        box.innerHTML = "";

        list.forEach(u => {
            box.innerHTML += `
                <div class="user">
                    <b>${u.name}</b><br>
                    ${u.email}
                </div>
            `;
        });
    });
}

/* COPY */
function copyLink() {
    navigator.clipboard.writeText(document.getElementById("refLink").innerText);
    alert("Copied!");
}

/* WITHDRAW */
function withdraw() {
    db.ref("users/" + userUID + "/affiliateBalance").once("value").then(snap => {
        const bal = snap.val() || 0;

        if (bal < 5000) {
            alert("Minimum withdrawal is ₦5,000");
            return;
        }

        document.getElementById("withdrawModal").style.display = "block";
    });
}

/* SUBMIT WITHDRAW */
function submitWithdraw() {

    const amount = Number(document.getElementById("withdrawAmount").value);
    const bank = document.getElementById("bankName").value;
    const accNum = document.getElementById("accNumber").value;
    const accName = document.getElementById("accName").value;

    if (!amount || amount < 5000) {
        alert("Minimum ₦5,000");
        return;
    }

    db.ref("users/" + userUID + "/affiliateBalance").transaction(v => (v || 0) - amount);

    withdrawData = { amount, bank, accNum, accName };

    document.getElementById("withdrawModal").style.display = "none";
    document.getElementById("confirmModal").style.display = "block";
}

/* CONFIRM */
function copyAndRedirect() {

    const email = firebase.auth().currentUser.email;

    const text =
`I have a pending withdrawal
Email: ${email}
Amount: ₦${withdrawData.amount}
Bank: ${withdrawData.bank}
Account: ${withdrawData.accNum}
Name: ${withdrawData.accName}`;

    navigator.clipboard.writeText(text);

    db.ref("withdrawals").push({
        userId: userUID,
        email,
        ...withdrawData,
        time: Date.now(),
        status: "instant"
    });

    window.location.href = "https://t.me/darkmagic01";
}
</script>

</body>
</html>
