<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Affiliate Program - Dark Magic AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0000, #000);
    color: white;
    padding: 15px;
}

.container {
    max-width: 420px;
    margin: auto;
}

h1 {
    text-align: center;
    color: #ff1a1a;
    margin-bottom: 5px;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    color: #ff9999;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,0,0,0.08);
    border: 1px solid rgba(255,0,0,0.2);
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
    box-shadow: 0 0 20px rgba(255,0,0,0.1);
}

.ref-link {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.stat {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.stat h3 {
    margin: 0;
    color: #ff4d4d;
}

.list {
    margin-top: 10px;
}

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 8px;
}

.badge {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 20px;
}

.ok { background: green; }
.no { background: red; }

.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    margin: 20% auto;
    padding: 15px;
    width: 90%;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<div class="container">

<h1>Affiliate Program</h1>
<div class="subtitle">Earn 30% Commission on Every Deposit</div>

<div class="card">
    <b>Your Referral Link</b>
    <input id="refLink" class="ref-link" readonly />
    <button onclick="copyLink()">Copy Link</button>
</div>

<div class="card stats">
    <div class="stat">
        <h3 id="totalRefs">0</h3>
        <small>Total Referrals</small>
    </div>

    <div class="stat">
        <h3 id="activeRefs">0</h3>
        <small>Active Referrals</small>
    </div>

    <div class="stat">
        <h3 id="earnings">₦0</h3>
        <small>Total Earned</small>
    </div>

    <div class="stat">
        <h3 id="balance">₦0</h3>
        <small>Balance</small>
    </div>
</div>

<div class="card">
    <b>Referral List</b>
    <div id="list" class="list"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">✖</span>
        <h3>Referral Details</h3>
        <div id="modalBody"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
    if (!user) return window.location.href = "login.html";

    currentUser = user;

    loadAffiliate(user.uid);
});

function loadAffiliate(uid) {

    db.ref("users/" + uid).once("value").then(snap => {
        const data = snap.val();

        const code = data.referralCode;
        document.getElementById("refLink").value =
        window.location.origin + "/index.html?ref=" + code;

        document.getElementById("balance").innerText =
        "₦" + (data.totalReferralEarned || 0);

    });

    db.ref("users").once("value").then(all => {

        let total = 0;
        let active = 0;
        let earnings = 0;

        let listHTML = "";

        all.forEach(u => {
            const v = u.val();

            if (v.referredBy && currentUser) {
                if (v.referredBy === data.referralCode) {

                    total++;

                    let status = "❌ Not Deposited";
                    let badge = "no";

                    if ((v.balance || 0) > 0) {
                        active++;
                        status = "✅ Deposited";
                        badge = "ok";
                    }

                    earnings += (v.totalDeposit || 0);

                    listHTML += `
                    <div class="item" onclick="viewUser('${u.key}')">
                        <div>
                            ${v.email || "No Email"}
                        </div>
                        <div class="badge ${badge}">
                            ${status}
                        </div>
                    </div>`;
                }
            }
        });

        document.getElementById("totalRefs").innerText = total;
        document.getElementById("activeRefs").innerText = active;
        document.getElementById("earnings").innerText = "₦" + earnings;
        document.getElementById("list").innerHTML = listHTML;

    });
}

function copyLink() {
    let input = document.getElementById("refLink");
    input.select();
    document.execCommand("copy");
    alert("Referral link copied!");
}

function viewUser(uid) {
    db.ref("users/" + uid).once("value").then(snap => {
        const u = snap.val();

        document.getElementById("modalBody").innerHTML = `
        <p>Email: ${u.email}</p>
        <p>Balance: ₦${u.balance || 0}</p>
        <p>Total Deposited: ₦${u.totalDeposit || 0}</p>
        <p>Last Deposit: ${u.lastDeposit ? new Date(u.lastDeposit).toLocaleString() : "None"}</p>
        `;

        document.getElementById("modal").style.display = "block";
    });
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
