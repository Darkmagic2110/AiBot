<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Affiliate Program - Dark Magic AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0000, #000);
    color: white;
    padding: 15px;
}

.container { max-width: 420px; margin: auto; }

h1 { text-align: center; color: #ff1a1a; }

.subtitle { text-align: center; font-size: 14px; color: #ff9999; margin-bottom: 20px; }

.card {
    background: rgba(255,0,0,0.08);
    border: 1px solid rgba(255,0,0,0.2);
    padding: 15px;
    border-radius: 14px;
    margin-bottom: 12px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(45deg, #ff0000, #990000);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.stat {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.stat h3 { margin: 0; color: #ff4d4d; }

.item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    margin-bottom: 8px;
}

.ok { background: green; }
.no { background: red; }

.modal {
    display: none;
    position: fixed;
    width: 100%; height: 100%;
    top: 0; left: 0;
    background: rgba(0,0,0,0.8);
}

.modal-content {
    background: #111;
    margin: 20% auto;
    padding: 15px;
    width: 90%;
    border-radius: 12px;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}
</style>
</head>

<body>

<div class="container">

<h1>Affiliate Program</h1>
<div class="subtitle">Earn 30% Commission on Every Deposit</div>

<div class="card">
    <b>Your Referral Link</b>
    <input id="refLink" readonly />
    <button onclick="copyLink()">Copy Link</button>
</div>

<div class="card stats">
    <div class="stat">
        <h3 id="totalRefs">0</h3>
        <small>Total Referrals</small>
    </div>

    <div class="stat">
        <h3 id="activeRefs">0</h3>
        <small>Active (First Deposit)</small>
    </div>

    <div class="stat">
        <h3 id="earnings">₦0</h3>
        <small>Total Earned</small>
    </div>

    <div class="stat">
        <h3 id="balance">₦0</h3>
        <small>Withdrawable Balance</small>
    </div>
</div>

<button onclick="openWithdraw()">💸 Withdraw</button>

<div class="card">
    <b>Referral List</b>
    <div id="list"></div>
</div>

</div>

<!-- WITHDRAW MODAL -->
<div class="modal" id="withdrawModal">
<div class="modal-content">
<span class="close" onclick="closeWithdraw()">✖</span>

<h3>Withdraw Funds</h3>

<input id="accNumber" placeholder="Account Number">
<input id="bankName" placeholder="Bank Name">
<input id="accName" placeholder="Account Name">
<input id="amount" placeholder="Amount">

<button onclick="submitWithdraw()">Submit Withdrawal</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
authDomain: "bets-d795d.firebaseapp.com",
databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
projectId: "bets-d795d"
});

const db = firebase.database();

let userData = null;
let currentUser = null;

firebase.auth().onAuthStateChanged(user=>{
if(!user) return location.href="loging.html";
currentUser = user;
load(user.uid);
});

function load(uid){

db.ref("users/"+uid).once("value").then(snap=>{
userData = snap.val() || {};

const code = userData.referralCode || "";
document.getElementById("refLink").value =
window.location.origin + "/index.html?ref=" + code;

// show affiliate earnings
document.getElementById("balance").innerText =
"₦" + (userData.affiliateEarned || 0);

loadStats(code);
});

}

function loadStats(myCode){

db.ref("users").once("value").then(all=>{
let total = 0;
let active = 0;
let earned = 0;
let list = "";

all.forEach(u=>{
const v = u.val();

if(v.referredBy === myCode){

total++;

// active only once (first successful deposit)
if(v.firstDepositDone === true) active++;

// total earned from this referral user (always updates)
earned += (v.affiliateEarned || 0);

list += `
<div class="item">
<div>${v.email || "User"}</div>
<div class="${v.firstDepositDone ? 'ok':'no'}">
${v.firstDepositDone ? "Active":"New"}
</div>
</div>`;
}
});

document.getElementById("totalRefs").innerText = total;
document.getElementById("activeRefs").innerText = active;
document.getElementById("earnings").innerText = "₦"+earned;
document.getElementById("list").innerHTML = list;
});
}

/* COPY */
function copyLink(){
let i=document.getElementById("refLink");
i.select();
document.execCommand("copy");
alert("Copied");
}

/* WITHDRAW */
function openWithdraw(){
document.getElementById("withdrawModal").style.display="block";
}

function closeWithdraw(){
document.getElementById("withdrawModal").style.display="none";
}

function submitWithdraw(){

let amt = Number(amount.value);

// minimum withdraw
if(amt < 5000){
alert("Minimum withdrawal is ₦5000");
return;
}

// prevent overdraft (IMPORTANT FIX)
let currentBalance = Number(userData.affiliateEarned || 0);

if(amt > currentBalance){
alert("Insufficient affiliate balance");
return;
}

// store bank details for reuse (NEW FEATURE)
db.ref("users/"+currentUser.uid+"/withdrawalDetails").set({
accountNumber: accNumber.value,
bankName: bankName.value,
accountName: accName.value
});

// subtract balance
db.ref("users/"+currentUser.uid+"/affiliateEarned")
.transaction(c => (c || 0) - amt);

// log withdrawal
db.ref("withdrawals").push({
uid: currentUser.uid,
accountNumber: accNumber.value,
bankName: bankName.value,
accountName: accName.value,
amount: amt,
status: "pending",
time: Date.now()
});

alert("Withdrawal submitted");
closeWithdraw();
}
</script>

</body>
</html>
