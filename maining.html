<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dark Magic Ai Bot - Main</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
    body { background: black; color: white; font-family: Arial, sans-serif; text-align: center; padding: 10px; }
    h1 { font-family: 'UnifrakturCook', cursive; font-size: 35px; color: red; margin-bottom: 5px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding-top: 20px; justify-items: center; }
    .game-button img { width: 100%; max-width: 120px; height: 120px; border-radius: 15px; object-fit: cover; border: 3px solid red; opacity: 0.3; pointer-events: none; transition: 0.2s ease-in-out; }
    .label { font-family: 'UnifrakturCook', cursive; margin-top: 5px; color: cyan; font-size: 16px; }
    button { width: 92%; padding: 14px; background: #e60000; font-family: 'Poppins', sans-serif; font-size: 18px; color: #ffffff; font-weight: 600; border-radius: 10px; border: none; margin-top: 12px; cursor: pointer; letter-spacing: 0.5px; transition: 0.3s ease-in-out; box-shadow: 0 0 18px rgba(255, 0, 0, 0.7); }
    button[disabled] { opacity: 0.6; pointer-events: none; box-shadow: none; }
    button:hover:not([disabled]) { box-shadow: 0 0 25px rgba(255, 0, 0, 1); }
    input[type="text"] { width: 90%; padding: 12px; font-size: 18px; margin-top: 10px; border-radius: 8px; border: none; }
    #toast { visibility: hidden; min-width: 240px; background-color: red; font-family: 'Poppins', sans-serif; color: black; text-align: center; border-radius: 10px; padding: 12px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 18px; z-index: 99999; opacity: 0; transition: opacity 0.3s, bottom 0.3s; }
    #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    #statusMessage { margin-top: 12px; font-size: 19px; color: yellow; }
    #instructionText { font-size: 18px; font-family: 'Poppins', sans-serif; color: orange; margin-bottom: 15px; }
    #registrationContainer { margin-bottom: 20px; }
    .small-muted { font-size: 13px; color: #aaa; margin-top: 6px; }

    #balanceContainer { position: fixed; top: 10px; right: 15px; background: #1a1a1a; padding: 4px 10px; border-radius: 20px; display: flex; align-items: center; font-family: 'Poppins', sans-serif; color: #fff; z-index: 9999; box-shadow: 0 0 12px rgba(255, 0, 0, 0.6); font-size: 14px; }
    #balanceAmount { font-size: 14px; margin-right: 6px; }
    #addBalanceBtn { font-size: 14px; background: red; border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; box-shadow: 0 0 6px rgba(255,0,0,0.8); display: flex; justify-content: center; align-items: center; transition: 0.2s ease-in-out; }
    #addBalanceBtn:hover { background: #ff3333; box-shadow: 0 0 12px rgba(255,0,0,1); }
</style>
</head>
<body>

<h1>Dark Magic Ai Bot</h1>

<div id="balanceContainer">
    <span id="balanceAmount">0</span> DM COINS
    <button id="addBalanceBtn">+</button>
</div>

<p id="statusMessage">Checking approval status...</p>

<div id="registrationContainer">
    <p id="instructionText">
        Click REGISTER below to create a new account ✅<br>
        Submit your NEW 1Win ID to access instantly.
    </p>

    <button id="registerBtn" onclick="window.open('https://lkxw.cc/9e8cb290', '_blank')">
        ✅ Register with Official Link
    </button>

    <input type="text" id="oneWinID" placeholder="Enter Your New 1Win Account ID" />
    <button id="submitIDBtn" onclick="submitID()">📩 Submit ID</button>
</div>

<div class="grid">
    <div class="game-button" id="luckyJetBtn"><img src="lucky.jpg"><div class="label">Lucky Jet</div></div>
    <div class="game-button" id="aviatorBtn"><img src="aviator.jpg"><div class="label">Aviator</div></div>
    <div class="game-button" id="diceBtn"><img src="dice.jpg"><div class="label">Dice</div></div>
    <div class="game-button" id="thimbleBtn"><img src="thimble.jpg"><div class="label">King Thimble</div></div>
    <div class="game-button" id="coinBtn"><img src="coin.jpg"><div class="label">CoinFlip</div></div>
    <div class="game-button" id="minesBtn"><img src="mine.jpg"><div class="label">Mines</div></div>
    <div class="game-button" id="luckyBtn"><img src="luckys.jpg"><div class="label">Lucky Jet Pro</div></div>
    <div class="game-button" id="rocketBtn"><img src="rocket.jpg"><div class="label">Rocket Queen</div></div>
    <div class="game-button" id="towerBtn"><img src="tower.jpg"><div class="label">Tower</div></div>
    <div class="game-button" id="chickenBtn"><img src="chick.jpg"><div class="label">Chicken Run</div></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let approvalStatus = null;
let currentUserUid = null;

const statusMessage = document.getElementById("statusMessage");
const registrationContainer = document.getElementById("registrationContainer");
const balanceDisplay = document.getElementById("balanceAmount");

firebase.auth().onAuthStateChanged(user => {
    if (!user) { window.location.href = "login.html"; return; }
    currentUserUid = user.uid;
    checkStatus(user.uid);
    listenBalance(user.uid);
});

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show",""); }, 3000);
}

function lockButtons() { document.querySelectorAll(".game-button img").forEach(i=>{i.style.opacity="0.3"; i.style.pointerEvents="none";}); }
function unlockButtons() { document.querySelectorAll(".game-button img").forEach(i=>{i.style.opacity="1"; i.style.pointerEvents="auto";}); }

function handleGameClick(page){
    if(approvalStatus!=="activated"){ toast("You must complete verification to access games."); return; }
    toast("Connecting to Game Server...");
    setTimeout(()=>{ location.href = page; }, 900);
}

const gamePages = {
    luckyJetBtn:"lucky.html", aviatorBtn:"aviator.html", diceBtn:"",
    luckyBtn:"luckys.html", coinBtn:"coin.html", minesBtn:"mines.html",
    towerBtn:"tower.html", chickenBtn:"chicken.html", thimbleBtn:"thimble.html", rocketBtn:null
};
Object.keys(gamePages).forEach(id=>{
    const page = gamePages[id];
    document.getElementById(id).onclick = ()=>{ if(!page) return toast("🚫 Server Unavailable"); handleGameClick(page); };
});

function submitID(){
    const user = firebase.auth().currentUser;
    if(!user) return toast("Auth error — please login again.");
    const idRaw = (document.getElementById("oneWinID").value||"").trim();
    if(!idRaw) return toast("Enter your 1Win ID");

    // ✅ ADDED VALIDATION ONLY
    if(isNaN(idRaw)) return toast("ID must be numbers only");
    if(Number(idRaw) < 335000000){
        return toast("Invalid ID ❌ Use a newly created 1Win ID");
    }

    statusMessage.innerHTML = "⏳ Validating ID...";
    lockButtons();

    setTimeout(()=>{
        statusMessage.innerHTML = `⏳ Connecting to 1Win ID: ${idRaw}...`;
        setTimeout(()=>{
            const updates = { email: user.email||"", oneWinID: idRaw, status:"approved" };
            db.ref("users/"+user.uid).update(updates)
            .then(()=>{
                approvalStatus="activated";
                statusMessage.innerHTML="✅ ID verified — You can now play!";
                registrationContainer.style.display="none";
                unlockButtons();
            }).catch(err=>{
                console.error(err);
                toast("Error submitting — try again.");
            });
        }, 2000);
    }, 5000);
}

function checkStatus(uid){
    statusMessage.innerHTML="Checking approval status...";
    registrationContainer.style.display="block";
    lockButtons();
    const ref = db.ref("users/"+uid);
    ref.on("value", snap=>{
        const data = snap.val()||{};
        const userStatus = data.status||null;
        if(userStatus==="activated"||userStatus==="approved"){
            approvalStatus="activated";
            statusMessage.innerHTML="✅ Fully verified — You can now play!";
            unlockButtons();
            registrationContainer.style.display="none";
        }else{
            approvalStatus=userStatus;
            statusMessage.innerHTML="🚫 You have not submitted your ID yet";
            lockButtons();
            registrationContainer.style.display="block";
        }
    });
}

function listenBalance(uid){
    const balRef = db.ref("users/"+uid+"/balance");
    balRef.on("value", snap=>{
        const val = snap.val();
        const coins = val!=null?Math.floor(val):0;
        balanceDisplay.innerText=coins;
    });
}

document.getElementById("addBalanceBtn").onclick=()=>{ window.location.href="deposit.html"; };
</script>

</body>
</html>
