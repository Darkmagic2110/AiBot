<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"], input[type="file"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    color: #000;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
}
#pdfLoader{
    display:none;
    color:yellow;
    margin-top:10px;
}
#pdfResult{
    margin-top:10px;
    color:cyan;
}
</style>
</head>
<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />

<input type="text" id="accountName" placeholder="Enter your bank account name (e.g., John Joe)" />

<button id="submitDepositBtn">💰 Pay Now</button>

<div id="paymentInstruction"></div>

<input type="file" id="pdfFile" accept="application/pdf">
<button onclick="verifyPDF()">Verify Payment</button>

<div id="pdfLoader">⏳ Verifying payment...</div>
<div id="pdfResult"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let paymentDetails = {};
db.ref("admin/paymentDetails").on("value", snap=>{
 if(snap.exists()) paymentDetails = snap.val();
});

document.getElementById("submitDepositBtn").onclick = ()=>{
 document.getElementById("paymentInstruction").innerHTML =
 "Account Number: "+paymentDetails.accountNumber+"<br>"+
 "Bank: "+paymentDetails.bankName+"<br>"+
 "Name: "+paymentDetails.accountName;
};

function cleanText(t){
 return t.replace(/[^a-z0-9]/g,'');
}

async function verifyPDF(){
 const file = document.getElementById("pdfFile").files[0];
 const amountInput = Number(document.getElementById("depositAmount").value);
 const userName = cleanText(document.getElementById("accountName").value.toLowerCase());
 const receiverName = cleanText((paymentDetails.accountName||"").toLowerCase());

 if(!file) return alert("Upload PDF");

 document.getElementById("pdfLoader").style.display="block";
 document.getElementById("pdfResult").innerHTML="";

 const reader = new FileReader();
 reader.onload = async function(){
  const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
  let text="";

  for(let i=1;i<=pdf.numPages;i++){
   const page = await pdf.getPage(i);
   const viewport = page.getViewport({scale:2});
   const canvas = document.createElement("canvas");
   const ctx = canvas.getContext("2d");
   canvas.width=viewport.width;
   canvas.height=viewport.height;

   await page.render({canvasContext:ctx,viewport}).promise;

   const img = canvas.toDataURL();
   const res = await Tesseract.recognize(img,'eng');
   text += res.data.text.toLowerCase();
  }

  let cleanPDF = cleanText(text);

  let errors=[];

  if(!cleanPDF.includes(amountInput.toString()))
    errors.push("❌ Amount mismatch");

  if(!(cleanPDF.includes(userName) || userName.includes(cleanPDF)))
    errors.push("❌ Sender name mismatch");

  if(!cleanPDF.includes(receiverName))
    errors.push("❌ Recipient mismatch");

  document.getElementById("pdfLoader").style.display="none";

  if(errors.length){
    document.getElementById("pdfResult").innerHTML = errors.join("<br>");
    return;
  }

  const coins = amountInput / 200;
  const user = firebase.auth().currentUser;

  db.ref("users/"+user.uid+"/balance").once("value").then(s=>{
    let bal = s.val() || 0;
    db.ref("users/"+user.uid).update({
      balance: bal + coins
    });
  });

  db.ref("users/"+user.uid+"/transactions").push({
    type:"deposit",
    amount:amountInput,
    coins:coins,
    status:"approved",
    time:Date.now()
  });

  document.getElementById("pdfResult").innerHTML="✅ Payment Verified!";
  
  setTimeout(()=>{
    window.location.href = "maining.html";
  },1500);

 };

 reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
