<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
}
#toast.show {
    visibility: visible;
}
#depositStatus {
    margin-top: 15px;
    font-size: 18px;
    color: yellow;
}
#coinRate {
    font-size: 16px;
    color: cyan;
    margin-top: 5px;
}
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />
<div id="coinRate">₦200 = 1 coin</div>
<button id="submitDepositBtn">💰 Buy Coins</button>

<div id="depositStatus"></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const depositStatus = document.getElementById("depositStatus");
const submitBtn = document.getElementById("submitDepositBtn");
const depositInput = document.getElementById("depositAmount");

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => {
        t.className = "";
    }, 3000);
}

/* LOAD FLUTTERWAVE KEY */

let flutterwavePublicKey = null;

db.ref("settings/flutterwaveKeys/public")
.once("value")
.then(snap => {

    flutterwavePublicKey = snap.val();

    if (!flutterwavePublicKey) {

        toast("Flutterwave key not found");

    }

});

/* VALIDATION */

function validateAmount(amount) {

    const min = 1000;
    const rate = 200;

    if (amount < min)
        return { valid: false, msg: `Minimum deposit is ₦${min}` };

    if (amount % rate !== 0) {

        const lower = amount - (amount % rate);
        const upper = amount + (rate - (amount % rate));

        return {
            valid: false,
            msg: `Enter a multiple of ₦${rate}. Try ₦${lower} or ₦${upper}`
        };

    }

    return { valid: true, coins: amount / rate };

}

/* BUTTON CLICK */

submitBtn.onclick = () => {

    if (!flutterwavePublicKey)
        return toast("Flutterwave key not loaded yet");

    const user = firebase.auth().currentUser;

    if (!user)
        return toast("Please login again");

    const amountRaw =
        Number(depositInput.value);

    if (!amountRaw)
        return toast("Enter valid amount");

    const validation =
        validateAmount(amountRaw);

    if (!validation.valid)
        return toast(validation.msg);

    const coins =
        validation.coins;

    depositStatus.innerHTML =
        `You will receive ${coins} coin(s)`;

    FlutterwaveCheckout({

        public_key: flutterwavePublicKey,

        tx_ref: "TX-" + Date.now(),

        amount: amountRaw,

        currency: "NGN",

        customer: {
            email: user.email
        },

        callback: function(response){

            if(response.status !== "successful")
                return toast("Payment failed");

            const userRef =
                db.ref("users/" + user.uid);

            userRef.child("balance")
            .once("value")
            .then(snap => {

                let current =
                    snap.val() || 0;

                return userRef
                .child("balance")
                .set(current + coins);

            })
            .then(() => {

                return userRef
                .child("transactions")
                .push({

                    type: "deposit",

                    coins: coins,

                    amount: amountRaw,

                    ref: response.transaction_id,

                    time: Date.now()

                });

            })
            .then(() => {

                toast("Payment successful!");

                setTimeout(() => {

                    window.location.href =
                        "maining.html";

                },1500);

            });

        },

        onclose: function(){

            toast("Payment cancelled");

        }

    });

};

</script>

</body>
</html>
