<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<!-- OCR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { background:black; color:white; font-family:Arial; text-align:center; padding:10px; }
h1 { font-family:'UnifrakturCook'; color:red; }
input,button { width:90%; padding:12px; margin-top:10px; border-radius:8px; }
button { background:#e60000; color:white; }
#toast { visibility:hidden; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:red; color:black; padding:10px; border-radius:8px; }
#toast.show { visibility:visible; }
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />
<input type="text" id="accountName" placeholder="Enter your bank account name" />

<!-- PDF -->
<input type="file" id="pdfInput" accept="application/pdf">

<button id="submitDepositBtn">💰 Pay Now</button>

<div id="depositStatus"></div>
<div id="paymentInstruction"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================== FIX LOGIN ISSUE ================== */
let currentUser = null;

firebase.auth().onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
    } else {
        window.location.href = "login.html";
    }
});

/* ================== FETCH PAYMENT DETAILS ================== */
let paymentDetails = { accountNumber:"", bankName:"", accountName:"" };

db.ref("admin/paymentDetails").on("value", snap => {
    if (snap.exists()) paymentDetails = snap.val();
});

/* ================== HELPERS ================== */

function toast(msg){
    const t=document.getElementById("toast");
    t.innerText=msg;
    t.className="show";
    setTimeout(()=>t.className="",3000);
}

function validateAmount(amount){
    if(amount < 1000) return {valid:false,msg:"Minimum ₦1000"};
    if(amount % 200 !== 0) return {valid:false,msg:"Must be multiple of ₦200"};
    return {valid:true,coins:amount/200};
}

function formatAmount(n){
    return "#" + n.toLocaleString() + ".00";
}

function nameMatch(a,b){
    a=a.toLowerCase();
    b=b.toLowerCase();
    return a.includes(b)||b.includes(a);
}

/* ================== OCR ================== */
async function readPDF(file){
    const reader=new FileReader();

    return new Promise(resolve=>{
        reader.onload=async function(){
            const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            let text="";

            for(let i=1;i<=pdf.numPages;i++){
                const page=await pdf.getPage(i);
                const viewport=page.getViewport({scale:2});
                const canvas=document.createElement("canvas");
                const ctx=canvas.getContext("2d");

                canvas.width=viewport.width;
                canvas.height=viewport.height;

                await page.render({canvasContext:ctx,viewport}).promise;

                const img=canvas.toDataURL();
                const result=await Tesseract.recognize(img,'eng');

                text+=result.data.text+"\n";
            }

            resolve(text);
        };

        reader.readAsArrayBuffer(file);
    });
}

/* ================== MAIN LOGIC ================== */

document.getElementById("submitDepositBtn").onclick = async ()=>{

    if(!currentUser) return toast("Loading user...");

    const amountRaw = Number(document.getElementById("depositAmount").value);
    const accountName = document.getElementById("accountName").value.trim();
    const file = document.getElementById("pdfInput").files[0];

    if(!amountRaw) return toast("Enter amount");
    if(!accountName) return toast("Enter name");
    if(!file) return toast("Upload receipt");

    const validation = validateAmount(amountRaw);
    if(!validation.valid) return toast(validation.msg);

    document.getElementById("depositStatus").innerText="Reading receipt...";

    const text = await readPDF(file);
    console.log(text);

    /* ===== AMOUNT ===== */
    if(!text.includes(formatAmount(amountRaw))){
        return toast("❌ Amount mismatch");
    }

    /* ===== RECIPIENT ===== */
    if(!nameMatch(text, paymentDetails.accountName)){
        return toast("❌ Recipient mismatch");
    }

    /* ===== SENDER ===== */
    if(!nameMatch(text, accountName)){
        return toast("❌ Sender mismatch");
    }

    /* ===== TIME ===== */
    const today = new Date().getDate();
    if(!text.includes(today)){
        return toast("❌ Old receipt");
    }

    /* ===== REUSE ===== */
    const hash = btoa(text).substring(0,60);
    const used = await db.ref("usedReceipts/"+hash).once("value");

    if(used.exists()){
        return toast("❌ Already used receipt");
    }

    await db.ref("usedReceipts/"+hash).set(true);

    /* ===== CREDIT ===== */
    const userRef = db.ref("users/"+currentUser.uid);

    const snap = await userRef.child("balance").once("value");
    let bal = snap.val() || 0;

    const coins = validation.coins;
    bal += coins;

    await userRef.update({balance:bal});

    /* ===== SAVE TRANSACTION ===== */
    await db.ref("users/"+currentUser.uid+"/transactions").push({
        type:"deposit",
        amount:amountRaw,
        coins:coins,
        accountName:accountName,
        time:Date.now(),
        status:"approved"
    });

    toast("✅ Deposit successful");

    setTimeout(()=>{
        window.location.href="maining.html";
    },2000);
};
</script>

</body>
</html>
