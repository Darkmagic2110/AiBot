<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"], input[type="file"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    color: #000;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
    box-shadow: 0 0 18px rgba(255, 0, 0, 0.7);
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    opacity: 0;
    transition: 0.3s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}
#loader {
    display: none;
    margin-top: 15px;
    color: cyan;
    font-weight: bold;
    animation: blink 1s infinite alternate;
}
@keyframes blink {
    0% { opacity: 1; }
    100% { opacity: 0.4; }
}
</style>
</head>
<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" />
<input type="text" id="accountName" placeholder="Enter your bank account name" />
<input type="file" id="receiptFile" accept="application/pdf" />

<button id="submitDepositBtn">💰 Pay Now</button>

<div id="loader">⏳ Verifying receipt...</div>
<div id="paymentInstruction"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const amountInput = document.getElementById("depositAmount");
const nameInput = document.getElementById("accountName");
const fileInput = document.getElementById("receiptFile");
const loader = document.getElementById("loader");

let paymentDetails = {};
db.ref("admin/paymentDetails").on("value", snap=>{
    paymentDetails = snap.val() || {};
    document.getElementById("paymentInstruction").innerHTML = `
    SEND TO:<br>
    ${paymentDetails.accountName}<br>
    ${paymentDetails.bankName}<br>
    ${paymentDetails.accountNumber}`;
});

function toast(msg){
    const t=document.getElementById("toast");
    t.innerHTML=msg;
    t.className="show";
    setTimeout(()=>t.className="",3000);
}

function clean(text){
    return text.toLowerCase();
}

function extractAmount(text){
    let match = text.match(/[\#₦]?\s?([\d,]+)/);
    if(!match) return null;
    return Number(match[1].replace(/,/g,''));
}

function extractTime(text){
    let match = text.match(/(\d{1,2}:\d{2}:\d{2})/);
    if(!match) return null;
    return match[1];
}

function timeValid(pdfTime){
    if(!pdfTime) return false;

    const now = new Date();
    const [h,m,s]=pdfTime.split(":").map(Number);
    const pdfDate = new Date();
    pdfDate.setHours(h,m,s);

    const diff = (now - pdfDate) / 60000;
    return diff <= 10;
}

function nameMatch(pdfText, userName){
    const parts = userName.toLowerCase().split(" ");
    return parts.some(p => pdfText.includes(p));
}

document.getElementById("submitDepositBtn").onclick = ()=>{
    const user = firebase.auth().currentUser;
    if(!user) return toast("Login required");

    const amount = Number(amountInput.value);
    const name = nameInput.value.trim();
    const file = fileInput.files[0];

    if(!amount || !name || !file) return toast("Fill all fields");

    loader.style.display="block";

    const reader = new FileReader();
    reader.onload = function(e){
        const text = clean(e.target.result);

        const pdfAmount = extractAmount(text);
        const pdfTime = extractTime(text);

        if(!pdfAmount || pdfAmount !== amount){
            loader.style.display="none";
            return toast("❌ Amount mismatch");
        }

        if(!nameMatch(text, name)){
            loader.style.display="none";
            return toast("❌ Sender name mismatch");
        }

        if(!nameMatch(text, paymentDetails.accountName)){
            loader.style.display="none";
            return toast("❌ Recipient mismatch");
        }

        if(!timeValid(pdfTime)){
            loader.style.display="none";
            return toast("❌ Receipt expired (over 10 mins)");
        }

        const coins = amount / 200;

        db.ref("users/"+user.uid+"/balance").once("value").then(snap=>{
            let bal = snap.val() || 0;
            db.ref("users/"+user.uid).update({
                balance: bal + coins
            }).then(()=>{
                loader.style.display="none";
                toast("✅ Deposit successful");
                window.location.href="maining.html";
            });
        });
    };

    reader.readAsText(file);
};
</script>

</body>
</html>
