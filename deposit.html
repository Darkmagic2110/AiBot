<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: 0.3s ease-in-out;
    box-shadow: 0 0 18px rgba(255, 0, 0, 0.7);
}
button:hover {
    box-shadow: 0 0 25px rgba(255, 0, 0, 1);
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    font-family: 'Poppins', sans-serif;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    z-index: 99999;
    opacity: 0;
    transition: opacity 0.3s, bottom 0.3s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}
#depositStatus {
    margin-top: 15px;
    font-size: 18px;
    color: yellow;
}
#coinRate {
    font-size: 16px;
    color: cyan;
    margin-top: 5px;
}

#refreshNotice {
    font-size: 14px;
    color: yellow;
    margin-top: 12px;
    font-weight: bold;
    animation: blinkGlow 1s infinite alternate;
}

@keyframes blinkGlow {
    0% {
        opacity: 1;
        text-shadow: 0 0 5px yellow, 0 0 10px orange;
    }
    100% {
        opacity: 0.4;
        text-shadow: 0 0 20px yellow, 0 0 30px red;
    }
}

#historyBox {
    margin-top: 25px;
    text-align: left;
}
.history-item {
    background: #111;
    border-radius: 10px;
    padding: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
    font-family: 'Poppins', sans-serif;
}
.history-left { text-align: left; }
.history-right { text-align: right; }
.history-title { color: lime; }
.history-sub { font-size: 12px; color: #aaa; }
.history-naira { color: cyan; font-size: 13px; }
</style>
</head>
<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />
<div id="coinRate">₦200 = 1 coin</div>
<button id="submitDepositBtn">💰 Buy Coins</button>

<div id="depositStatus"></div>

<div id="refreshNotice">⚡ Make sure to return back to the site immediately after payment ⚡</div>

<div id="historyBox">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    projectId: "bets-d795d",
    storageBucket: "bets-d795d.appspot.com",
    messagingSenderId: "384386108287",
    appId: "1:384386108287:android:d238a5ec8068d9bb9be84a",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const depositStatus = document.getElementById("depositStatus");
const submitBtn = document.getElementById("submitDepositBtn");
const depositInput = document.getElementById("depositAmount");
const historyList = document.getElementById("historyList");

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
}

firebase.auth().onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    db.ref("users/" + user.uid + "/transactions").once("value").then(snap => {
        historyList.innerHTML = "";
        let arr = [];

        snap.forEach(child => {
            let tx = child.val();
            tx.key = child.key;
            arr.push(tx);
        });

        arr.sort((a,b)=> b.time - a.time);

        arr.forEach(tx => {
            if(tx.type === "deposit"){
                const d = new Date(tx.time).toLocaleString();

                historyList.innerHTML += `
                <div class="history-item">
                    <div class="history-left">
                        <div class="history-title">+${tx.coins} Coins</div>
                        <div class="history-sub">Ref: ${tx.ref}</div>
                        <div class="history-sub">${d}</div>
                    </div>
                    <div class="history-right">
                        <div>+${tx.coins}</div>
                        <div class="history-naira">₦${tx.amount}</div>
                    </div>
                </div>`;
            }
        });

    });
});

let flutterwaveKey = null;
db.ref("settings/flutterwaveKeys/public").once("value").then(snap => {
    flutterwaveKey = snap.val() || "";
});

function validateAmount(amount) {
    const min = 1000;
    const rate = 200;
    if (amount < min) return { valid: false, msg: `Minimum deposit is ₦${min}` };
    if (amount % rate !== 0) {
        const lower = amount - (amount % rate);
        const upper = amount + (rate - (amount % rate));
        return { valid: false, msg: `Enter a multiple of ₦${rate}. Try ₦${lower} or ₦${upper}` };
    }
    return { valid: true, coins: amount / rate };
}

submitBtn.onclick = () => {
    const user = firebase.auth().currentUser;
    if (!user) return toast("Please login again");

    const amountRaw = Number(depositInput.value);
    if (!amountRaw) return toast("Enter a valid deposit amount");

    const validation = validateAmount(amountRaw);
    if (!validation.valid) return toast(validation.msg);

    const coins = validation.coins;
    depositStatus.innerHTML = `You will receive ${coins} coin(s) for ₦${amountRaw}`;

    if (!flutterwaveKey) return toast("Payment key not loaded — try again");

    FlutterwaveCheckout({
        public_key: flutterwaveKey,
        tx_ref: "TX-" + Date.now(),
        amount: amountRaw,
        currency: "NGN",
        payment_options: "card, banktransfer, ussd",
        customer: {
            email: user.email
        },

        callback: function (response) {

            const txId = response.transaction_id;

            // ✅ STRICT VALIDATION (THIS IS THE FIX)
            if (
                !txId ||
                response.status !== "successful" ||
                response.amount !== amountRaw
            ) {
                return toast("Payment not successful");
            }

            const userRef = db.ref("users/" + user.uid);

            db.ref("processedPayments/" + txId).once("value").then(snap => {

                if (!snap.exists()) {

                    db.ref("processedPayments/" + txId).set(true);

                    userRef.child("balance").transaction(current => {
                        return (current || 0) + coins;
                    });

                    userRef.child("transactions").push({
                        type: "deposit",
                        coins: coins,
                        amount: amountRaw,
                        ref: txId,
                        time: Date.now()
                    });

                    toast("Payment successful! Ref: " + txId);
                    depositStatus.innerHTML = `Payment complete! Coins added: ${coins}`;
                }

                setTimeout(()=>{
                    window.location.href = "maining.html";
                },1500);

            });
        },

        onclose: function() {
            toast("Payment cancelled");
        }
    });
};
</script>

</body>
</html>
