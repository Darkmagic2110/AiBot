<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #fff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background: red;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    transition: 0.3s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}
#depositStatus {
    margin-top: 15px;
    color: yellow;
}
#historyBox {
    margin-top: 25px;
    text-align: left;
}
.history-item {
    background: #111;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}
.history-title { color: lime; }
.history-naira { color: cyan; }
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />
<button id="submitDepositBtn">💰 Buy Coins</button>

<div id="depositStatus"></div>

<div id="historyBox">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const depositInput = document.getElementById("depositAmount");
const submitBtn = document.getElementById("submitDepositBtn");
const historyList = document.getElementById("historyList");

function toast(msg){
    const t=document.getElementById("toast");
    t.innerHTML=msg;
    t.className="show";
    setTimeout(()=>t.className="",3000);
}

function generateTxId(){
    return "TX-"+Date.now()+"-"+Math.floor(Math.random()*999999);
}

function validateAmount(amount){
    if(amount < 1000) return {valid:false,msg:"Minimum ₦1000"};
    if(amount % 200 !== 0) return {valid:false,msg:"Use multiples of ₦200"};
    return {valid:true,coins:amount/200};
}

/* =========================
   AUTH + RETURN HANDLER
========================= */
firebase.auth().onAuthStateChanged(async user => {

    if(!user){
        location.href="login.html";
        return;
    }

    // Load history
    db.ref("users/" + user.uid + "/transactions").once("value").then(snap=>{
        historyList.innerHTML="";
        snap.forEach(c=>{
            let t=c.val();
            if(t.type==="deposit"){
                historyList.innerHTML+=`
                <div class="history-item">
                    <div>
                        <div class="history-title">+${t.coins} Coins</div>
                        <div>${new Date(t.time).toLocaleString()}</div>
                    </div>
                    <div class="history-naira">₦${t.amount}</div>
                </div>`;
            }
        });
    });

    // HANDLE RETURN FROM SELAR
    const txId = new URLSearchParams(window.location.search).get("tx");

    if(!txId) return;

    try {

        const txRef = db.ref("transactions/" + txId);
        const snap = await txRef.once("value");

        if(!snap.exists()){
            toast("Transaction not found");
            return;
        }

        const tx = snap.val();

        if(tx.status === "done"){
            toast("Already processed");
            return;
        }

        if(tx.uid !== user.uid){
            toast("Unauthorized");
            return;
        }

        let userRef = db.ref("users/" + user.uid);

        // SAFE BALANCE UPDATE
        const balSnap = await userRef.child("balance").once("value");
        let current = balSnap.val() || 0;

        await userRef.child("balance").set(Number(current) + Number(tx.coins));

        await userRef.child("transactions").push({
            type:"deposit",
            coins:tx.coins,
            amount:tx.amount,
            ref:txId,
            time:Date.now()
        });

        await txRef.update({status:"done"});

        toast("✅ Deposit Successful");

        setTimeout(()=>{
            window.location.href="maining.html";
        },1500);

    } catch(err){
        console.log(err);
        toast("❌ Error processing deposit");
    }
});

/* =========================
   CLICK BUY
========================= */
submitBtn.onclick = async () => {

    const user = firebase.auth().currentUser;
    if(!user) return toast("Login required");

    let amount = Number(depositInput.value);
    let v = validateAmount(amount);
    if(!v.valid) return toast(v.msg);

    let txId = generateTxId();

    // SAVE TX BEFORE REDIRECT (CRITICAL FIX)
    await db.ref("transactions/" + txId).set({
        uid:user.uid,
        amount:amount,
        coins:v.coins,
        status:"pending",
        time:Date.now()
    });

    let selar = "https://selar.com/wz7sf30yxy";

    let redirect = encodeURIComponent(
        location.origin + location.pathname + "?tx=" + txId
    );

    window.location.href = selar + "?amount=" + amount + "&redirect_url=" + redirect;
};
</script>

</body>
</html>
