<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<!-- ✅ ADDED OCR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
/* ====== YOUR ORIGINAL CSS (UNCHANGED) ====== */
body { background: black; color: white; font-family: Arial; text-align: center; padding: 10px; }
h1 { font-family: 'UnifrakturCook'; color:red; }
input,button { width:90%; padding:12px; margin-top:10px; border-radius:8px; }
button { background:red; color:white; }
#toast { visibility:hidden; }
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" />
<input type="text" id="accountName" placeholder="Enter your bank account name" />

<!-- ✅ ADDED PDF INPUT -->
<input type="file" id="pdfInput" accept="application/pdf">

<button id="submitDepositBtn">💰 Pay Now</button>

<div id="depositStatus"></div>
<div id="paymentInstruction"></div>
<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= ORIGINAL ================= */
let paymentDetails = { accountNumber:"", bankName:"", accountName:"" };

db.ref("admin/paymentDetails").on("value", snap => {
    if (snap.exists()) paymentDetails = snap.val();
});

/* ================= HELPERS ================= */

function toast(msg){
    const t=document.getElementById("toast");
    t.innerHTML=msg;
    t.style.visibility="visible";
    setTimeout(()=>t.style.visibility="hidden",3000);
}

function formatAmount(n){
    return "#" + n.toLocaleString() + ".00";
}

function nameMatch(a,b){
    a=a.toLowerCase();
    b=b.toLowerCase();
    return a.includes(b)||b.includes(a);
}

async function readPDF(file){
    const reader=new FileReader();
    return new Promise(resolve=>{
        reader.onload=async function(){
            const pdf=await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            let text="";

            for(let i=1;i<=pdf.numPages;i++){
                const page=await pdf.getPage(i);
                const viewport=page.getViewport({scale:2});
                const canvas=document.createElement("canvas");
                const ctx=canvas.getContext("2d");

                canvas.width=viewport.width;
                canvas.height=viewport.height;

                await page.render({canvasContext:ctx,viewport}).promise;

                const img=canvas.toDataURL();

                const result=await Tesseract.recognize(img,'eng');
                text+=result.data.text+"\n";
            }
            resolve(text);
        };
        reader.readAsArrayBuffer(file);
    });
}

/* ================= UPDATED SUBMIT ================= */

document.getElementById("submitDepositBtn").onclick = async ()=>{

    const user = firebase.auth().currentUser;
    if (!user) return toast("Login first");

    const amountRaw = Number(document.getElementById("depositAmount").value);
    const accountName = document.getElementById("accountName").value.trim();
    const file = document.getElementById("pdfInput").files[0];

    if(!amountRaw || !accountName || !file) return toast("Fill all fields");

    document.getElementById("depositStatus").innerText="Reading PDF...";

    const text = await readPDF(file);

    console.log(text);

    /* ========= 1. AMOUNT ========= */
    const formatted = formatAmount(amountRaw);
    if(!text.includes(formatted)){
        return toast("❌ Amount mismatch");
    }

    /* ========= 2. RECIPIENT (FIREBASE) ========= */
    if(!nameMatch(text, paymentDetails.accountName)){
        return toast("❌ Recipient mismatch");
    }

    /* ========= 3. SENDER ========= */
    if(!nameMatch(text, accountName)){
        return toast("❌ Sender name mismatch");
    }

    /* ========= 4. TIME ========= */
    const today = new Date().toLocaleDateString().split("/")[0];
    if(!text.includes(today)){
        return toast("❌ Old receipt");
    }

    /* ========= 5. PREVENT REUSE ========= */
    const hash = btoa(text).substring(0,60);
    const used = await db.ref("usedReceipts/"+hash).once("value");

    if(used.exists()){
        return toast("❌ Receipt already used");
    }

    await db.ref("usedReceipts/"+hash).set(true);

    /* ========= ADD BALANCE ========= */
    const userRef = db.ref("users/"+user.uid);

    const balSnap = await userRef.child("balance").once("value");
    let bal = balSnap.val() || 0;

    const coins = amountRaw / 200;
    bal += coins;

    await userRef.update({balance:bal});

    /* ========= SAVE TRANSACTION ========= */
    await db.ref("users/"+user.uid+"/transactions").push({
        type:"deposit",
        amount:amountRaw,
        coins:coins,
        accountName:accountName,
        time:Date.now(),
        status:"approved"
    });

    toast("✅ Deposit successful");

    setTimeout(()=>{
        window.location.href="maining.html";
    },2000);
};
</script>

</body>
</html>
