<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Receipt Extractor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
.result { margin-top: 20px; background: #f5f5f5; padding: 15px; }
</style>
</head>
<body>

<h2>Upload Transaction Receipt PDF</h2>
<input type="file" id="upload" accept="application/pdf">

<div class="result" id="output"></div>

<script>
const upload = document.getElementById("upload");
const output = document.getElementById("output");

upload.addEventListener("change", async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;

        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();

            content.items.forEach(item => {
                fullText += item.str + " ";
            });
        }

        console.log(fullText);

        // =========================
        // FIELD EXTRACTION LOGIC
        // =========================

        // Amount
        const amountMatch = fullText.match(/₦\s?\d{1,3}(,\d{3})*(\.\d{2})?/);

        // Date
        const dateMatch = fullText.match(/\d{1,2}[-\/]\d{1,2}[-\/]\d{2,4}/);

        // Time
        const timeMatch = fullText.match(/\d{1,2}:\d{2}(\s?[APMapm]{2})?/);

        // Sender Name (multiple patterns)
        const senderMatch = fullText.match(/(Sender|From|Paid by)[:\s]*([A-Z\s]{3,})/i);

        // Receiver Name
        const receiverMatch = fullText.match(/(Receiver|To|Beneficiary)[:\s]*([A-Z\s]{3,})/i);

        // Bank Name
        const bankMatch = fullText.match(/(Bank|Bank Name)[:\s]*([A-Z\s]{3,})/i);

        // =========================
        // CLEAN VALUES
        // =========================

        const amount = amountMatch ? amountMatch[0] : "Not found";
        const date = dateMatch ? dateMatch[0] : "Not found";
        const time = timeMatch ? timeMatch[0] : "Not found";

        const sender = senderMatch ? senderMatch[2].trim() : "Not found";
        const receiver = receiverMatch ? receiverMatch[2].trim() : "Not found";
        const bank = bankMatch ? bankMatch[2].trim() : "Not found";

        // =========================
        // OUTPUT
        // =========================

        output.innerHTML = `
            <h3>Extracted Transaction Details</h3>
            <p><b>Amount:</b> ${amount}</p>
            <p><b>Sender:</b> ${sender}</p>
            <p><b>Receiver:</b> ${receiver}</p>
            <p><b>Receiver Bank:</b> ${bank}</p>
            <p><b>Date:</b> ${date}</p>
            <p><b>Time:</b> ${time}</p>
        `;
    };

    reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
