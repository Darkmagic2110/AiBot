<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Buy Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

<style>
/* SAME CSS AS YOURS */
body {background: #000;color: white;font-family: 'Poppins', sans-serif;text-align: center;padding: 15px;}
h1 {font-family: 'UnifrakturCook', cursive;font-size: 38px;color: #ff1a1a;margin-bottom: 8px;text-shadow: 0 0 10px rgba(255,0,0,0.5);}
.subtitle {color: #ccc;font-size: 14px;margin-bottom: 20px;}
.input-group {margin: 15px 0;text-align: left;width: 92%;margin-left: auto;margin-right: auto;}
label {font-size: 14px;color: #aaa;margin-bottom: 5px;display: block;}
select, input[type="number"], input[type="text"] {width: 100%;padding: 14px;font-size: 16px;border-radius: 10px;border: 2px solid #333;background: #111;color: white;box-sizing: border-box;transition: 0.3s;}
select:focus, input:focus {border-color: #ff1a1a;outline: none;box-shadow: 0 0 10px rgba(255,0,0,0.4);}
.glass-btn {width: 92%;padding: 15px;background: rgba(255, 0, 0, 0.15);backdrop-filter: blur(12px);-webkit-backdrop-filter: blur(12px);border: 1px solid rgba(255, 0, 0, 0.4);font-family: 'Poppins', sans-serif;font-size: 18px;color: #ffffff;font-weight: 700;border-radius: 15px;margin-top: 15px;cursor: pointer;letter-spacing: 0.5px;transition: 0.3s ease-in-out;box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);}
.glass-btn:hover {transform: scale(1.02);background: rgba(255, 0, 0, 0.25);box-shadow: 0 0 30px rgba(255, 0, 0, 0.9);}
#toast {visibility: hidden;min-width: 260px;background-color: #ff1a1a;color: white;text-align: center;border-radius: 12px;padding: 14px;position: fixed;bottom: 30px;left: 50%;transform: translateX(-50%);font-size: 16px;font-weight: 600;z-index: 99999;opacity: 0;transition: opacity 0.3s, bottom 0.3s;}
#toast.show {visibility: visible;opacity: 1;bottom: 50px;}
#coinRate {font-size: 15px;color: #00e5ff;margin-top: 8px;font-weight: 600;}
#refreshNotice {font-size: 13px;color: #ffdd00;margin-top: 15px;font-weight: 600;animation: blinkGlow 1.2s infinite alternate;}
@keyframes blinkGlow {0% { opacity: 1; text-shadow: 0 0 5px #ffdd00; }100% { opacity: 0.5; text-shadow: 0 0 15px #ff1a1a; }}
</style>
</head>
<body>

<h1>Deposit Coins</h1>
<p class="subtitle">Power up your Dark Magic Ai Bot</p>

<!-- NEW: 1WIN ID INPUT -->
<div class="input-group">
    <label>Enter Your 1Win ID <span style="color:#ff1a1a;">*Required for coin credit</span></label>
    <input type="text" id="onewinIdInput" placeholder="Enter numbers only" />
</div>

<div class="input-group">
    <label>Select Your African Country</label>
    <select id="countrySelect">
        <option value="">-- Choose Country --</option>
    </select>
</div>

<div class="input-group">
    <label id="amountLabel">Enter Deposit Amount</label>
    <input type="number" id="depositAmount" placeholder="Select country first" min="1" step="any" />
    <div id="coinRate"></div>
</div>

<button class="glass-btn" id="submitDepositBtn">💰 Buy Coins Now</button>

<div id="depositStatus"></div>
<div id="refreshNotice">⚡ Return to site immediately after payment to credit coins ⚡</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
const REPLIT_CREDIT_KEY = "PASTE-YOUR-KEY-HERE"; // CHANGE THIS

const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const countrySelect = document.getElementById("countrySelect");
const depositInput = document.getElementById("depositAmount");
const amountLabel = document.getElementById("amountLabel");
const coinRate = document.getElementById("coinRate");
const submitBtn = document.getElementById("submitDepositBtn");
const depositStatus = document.getElementById("depositStatus");
const onewinInput = document.getElementById("onewinIdInput");

let selectedCountry = "";
let flutterwaveKey = null;
let currentUser = null;

const AFRICAN_RATES = {
    "NG": {name: "Nigeria 🇳🇬", currency: "NGN", symbol: "₦", rate: 1, flutterwave: "NGN"},
    "GH": {name: "Ghana 🇬🇭", currency: "GHS", symbol: "GH₵", rate: 0.0083, flutterwave: "GHS"}, // FIXED RATE
    "ZA": {name: "South Africa 🇿🇦", currency: "ZAR", symbol: "R", rate: 0.11, flutterwave: "ZAR"},
    "KE": {name: "Kenya 🇰🇪", currency: "KES", symbol: "KSh", rate: 2.3, flutterwave: "KES"},
    "UG": {name: "Uganda 🇺🇬", currency: "UGX", symbol: "USh", rate: 70, flutterwave: "UGX"},
    "TZ": {name: "Tanzania 🇹🇿", currency: "TZS", symbol: "TSh", rate: 45, flutterwave: "TZS"},
    "CM": {name: "Cameroon 🇨🇲", currency: "XAF", symbol: "FCFA", rate: 12, flutterwave: "XAF"},
    "SN": {name: "Senegal 🇸🇳", currency: "XOF", symbol: "CFA", rate: 12, flutterwave: "XOF"}
};
Object.keys(AFRICAN_RATES).forEach(code => {
    const opt = document.createElement("option");
    opt.value = code;
    opt.textContent = AFRICAN_RATES[code].name;
    countrySelect.appendChild(opt);
});

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => t.className = t.className.replace("show", ""), 3500);
}

countrySelect.onchange = () => {
    selectedCountry = countrySelect.value;
    if(!selectedCountry) {coinRate.innerHTML = "";depositInput.placeholder = "Select country first";return;}
    const c = AFRICAN_RATES[selectedCountry];
    const coinPrice = Math.ceil(200 * c.rate);
    const minDeposit = Math.ceil(1000 * c.rate);
    amountLabel.innerHTML = `Enter Deposit Amount (${c.symbol})`;
    depositInput.placeholder = `Min ${c.symbol}${minDeposit}`;
    depositInput.min = minDeposit;
    coinRate.innerHTML = `${c.symbol}${coinPrice} = 1 Coin | Min Deposit: ${c.symbol}${minDeposit} = 5 Coins`;
};

function validateAmount(amount, countryCode) {
    const c = AFRICAN_RATES[countryCode];
    const coinPrice = Math.ceil(200 * c.rate);
    const minDeposit = Math.ceil(1000 * c.rate);
    if (amount < minDeposit) return { valid: false, msg: `Minimum deposit is ${c.symbol}${minDeposit}` };
    const coins = Math.floor(amount / coinPrice);
    if (coins < 5) return { valid: false, msg: `Minimum 5 coins. Deposit at least ${c.symbol}${minDeposit}` };
    return { valid: true, coins };
}

firebase.auth().onAuthStateChanged(user => {
    if (!user) return window.location.href = "login.html";
    currentUser = user;
});

db.ref("settings/flutterwaveKeys/public").once("value").then(snap => {
    flutterwaveKey = snap.val() || "";
});

// NEW: FUNCTION TO CREDIT VIA REPLIT
async function creditCoinsViaReplit(buyer1winId, coins, paymentOrderId) {
    try {
        const response = await fetch("https://telegram-guard.replit.app/api/onewin/credit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-Credit-Key": REPLIT_CREDIT_KEY
            },
            body: JSON.stringify({
                registration_id: buyer1winId,
                coins: coins,
                order_id: paymentOrderId
            })
        });
        return await response.json();
    } catch(e) {
        console.log(e);
        return {success: false, message: "Server connection error"};
    }
}

function startPayment(user, amountRaw, coins, countryCode, buyer1winId) {
    const c = AFRICAN_RATES[countryCode];
    let payment_options = "card";
    if(countryCode === "NG") payment_options = "card, banktransfer, ussd";

    const tx_ref = "DM-" + Date.now() + "-" + user.uid; // UNIQUE ORDER ID

    FlutterwaveCheckout({
        public_key: flutterwaveKey,
        tx_ref: tx_ref,
        amount: amountRaw,
        currency: c.flutterwave,
        payment_options: payment_options,
        customer: { email: user.email, name: user.displayName || "User" },
        customizations: { title: "Dark Magic Ai Bot", description: `${coins} Coins Purchase` },
        callback: async function (response) {
            const txId = response.transaction_id;
            if (!txId) return toast("Payment not completed");

            if (response.status === "successful" || response.status === "completed") {
                depositStatus.innerHTML = "⏳ Verifying payment...";
                submitBtn.disabled = true;

                // STEP 1: CALL REPLIT TO CREDIT COINS TO TELEGRAM BOT
                const result = await creditCoinsViaReplit(buyer1winId, coins, tx_ref);

                if (result.success) {
                    // STEP 2: ALSO SAVE TO FIREBASE FOR WEBSITE BALANCE
                    await db.ref("users/" + user.uid + "/balance").transaction(v => (v || 0) + coins);
                    await db.ref("users/" + user.uid + "/transactions").push({
                        type: "deposit", coins, amount: amountRaw, currency: c.currency, symbol: c.symbol,
                        ref: tx_ref, time: Date.now(), country: countryCode, oneWinID: buyer1winId
                    });

                    toast(`✅ Payment successful! +${coins} Coins Credited`);
                    depositStatus.innerHTML = `Coins Added: ${coins} | New Balance: ${result.new_balance || 'N/A'}`;
                    setTimeout(() => { window.location.href = "main.html"; }, 2500);

                } else {
                    // Failed - user hasn't verified in bot
                    toast(`❌ ${result.message || "Please verify your 1win ID in our Telegram bot first"}`);
                    depositStatus.innerHTML = "🚫 Payment received but coins not credited. Contact support with TX: " + tx_ref;
                }
            } else {
                toast("Payment failed. Try again.");
            }
            submitBtn.disabled = false;
        },
        onclose: () => toast("Payment cancelled")
    });
}

submitBtn.onclick = () => {
    if (!currentUser) return toast("Please login again");
    const buyer1winId = onewinInput.value.trim();
    if (!buyer1winId) return toast("Please enter your 1Win ID");
    if (!selectedCountry) return toast("Please select your country");

    const amountRaw = Number(depositInput.value);
    if (!amountRaw || amountRaw <= 0) return toast("Enter a valid amount");

    const check = validateAmount(amountRaw, selectedCountry);
    if (!check.valid) return toast(check.msg);
    if (!flutterwaveKey) return toast("Payment key not loaded. Refresh page.");

    // Show instructions then start payment
    if(confirm("You will pay " + amountRaw + " and get " + check.coins + " coins. Continue?")){
        startPayment(currentUser, amountRaw, check.coins, selectedCountry, buyer1winId);
    }
};
</script>
</body>
</html>
