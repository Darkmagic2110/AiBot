<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
}
input[type="number"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-size: 18px;
    color: white;
    border-radius: 10px;
    margin-top: 12px;
    cursor: pointer;
}

#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
}
#toast.show {
    visibility: visible;
    bottom: 50px;
}

#historyBox { margin-top: 25px; text-align: left; }
.history-item {
    background: #111;
    border-radius: 10px;
    padding: 12px;
    margin: 10px 0;
    display: flex;
    justify-content: space-between;
}
.history-title { color: lime; }
.history-sub { font-size: 12px; color: #aaa; }
.history-naira { color: cyan; }
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter amount (₦)" min="1000" />
<button id="submitDepositBtn">💰 Buy Coins</button>

<div id="historyBox">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function toast(msg){
    const t=document.getElementById("toast");
    t.innerHTML=msg;
    t.className="show";
    setTimeout(()=>t.className="",3000);
}

function generateTxId(){
    return "TX-"+Date.now()+"-"+Math.floor(Math.random()*999999);
}

function validateAmount(amount){
    if(amount < 1000) return {valid:false,msg:"Minimum ₦1000"};
    return {valid:true,coins:amount/200};
}

/* ================= AUTH ================= */
firebase.auth().onAuthStateChanged(async user=>{
if(!user){
    location.href="login.html";
    return;
}

/* ================= FIXED PAYMENT RETURN ================= */
const params = new URLSearchParams(window.location.search);

const txId =
    params.get("tx") ||
    params.get("transaction_id") ||
    params.get("ref");

if(txId){

    const txRef = db.ref("transactions/"+txId);
    const snap = await txRef.once("value");

    if(!snap.exists()){
        toast("Transaction not found");
        return;
    }

    const tx = snap.val();

    if(tx.status === "done"){
        return; // already processed
    }

    if(tx.uid !== user.uid){
        toast("Unauthorized");
        return;
    }

    /* 🔥 SAFE BALANCE UPDATE */
    const balRef = db.ref("users/"+user.uid+"/balance");

    await balRef.transaction(current=>{
        return (current || 0) + tx.coins;
    });

    await db.ref("users/"+user.uid+"/transactions").push({
        type:"deposit",
        coins:tx.coins,
        amount:tx.amount,
        ref:txId,
        time:Date.now()
    });

    await txRef.update({status:"done"});

    toast("✅ Coins Added");

    setTimeout(()=>{
        window.location.href="maining.html";
    },1500);
}

/* ================= HISTORY ================= */
db.ref("users/"+user.uid+"/transactions").once("value").then(snap=>{
historyList.innerHTML="";

let arr=[];
snap.forEach(c=> arr.push(c.val()));

arr.sort((a,b)=>b.time-a.time);

arr.forEach(t=>{
if(t.type==="deposit"){
historyList.innerHTML += `
<div class="history-item">
<div>
<div class="history-title">+${t.coins} Coins</div>
<div class="history-sub">${new Date(t.time).toLocaleString()}</div>
</div>
<div class="history-naira">₦${t.amount}</div>
</div>`;
}
});
});
});

/* ================= CLICK ================= */
document.getElementById("submitDepositBtn").onclick = async ()=>{

const user = firebase.auth().currentUser;
if(!user) return;

let amount = Number(document.getElementById("depositAmount").value);
let v = validateAmount(amount);

if(!v.valid){
    toast(v.msg);
    return;
}

let txId = generateTxId();

/* SAVE TX */
await db.ref("transactions/"+txId).set({
    uid:user.uid,
    amount:amount,
    coins:v.coins,
    status:"pending",
    time:Date.now()
});

/* REDIRECT TO SELAR */
let selar = "https://selar.com/wz7sf30yxy";
window.location.href = selar + "?tx=" + txId;
};
</script>

</body>
</html>
