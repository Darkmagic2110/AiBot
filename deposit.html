<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}

h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
}

input {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    color: white;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    margin-top: 12px;
    cursor: pointer;
}

#toast {
    visibility: hidden;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: red;
    padding: 12px;
    border-radius: 10px;
    color: black;
}

#toast.show {
    visibility: visible;
}

.history-item {
    background: #111;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    display:flex;
    justify-content:space-between;
}
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter amount (₦)" min="1000" />
<button id="submitDepositBtn">💰 Buy Coins</button>

<button id="verifyBtn" style="display:none; background:green;">
✅ I have made payment (Verify)
</button>

<div id="historyBox"></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
    projectId: "bets-d795d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentTxId = null;

function toast(msg){
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(()=>t.className="",3000);
}

function generateTxId(){
    return "TX-"+Date.now()+"-"+Math.floor(Math.random()*999999);
}

function validate(amount){
    if(amount < 1000) return false;
    if(amount % 200 !== 0) return false;
    return true;
}

/* ================= AUTH ================= */
firebase.auth().onAuthStateChanged(async user=>{
if(!user) return location.href="login.html";

/* LOAD HISTORY */
db.ref("users/"+user.uid+"/transactions").once("value").then(snap=>{
    let box = document.getElementById("historyBox");
    box.innerHTML = "";

    let arr=[];
    snap.forEach(c=>arr.push(c.val()));
    arr.sort((a,b)=>(b.time||0)-(a.time||0));

    arr.forEach(t=>{
        if(t.type==="deposit"){
            box.innerHTML += `
            <div class="history-item">
                <div>+${t.coins} Coins</div>
                <div>₦${t.amount}</div>
            </div>`;
        }
    });
});

/* VERIFY BUTTON */
document.getElementById("verifyBtn").onclick = async ()=>{

    if(!currentTxId) return toast("No transaction found");

    const txRef = db.ref("transactions/"+currentTxId);
    const snap = await txRef.once("value");

    if(!snap.exists()) return toast("Invalid transaction");

    const tx = snap.val();

    if(tx.status === "done") return toast("Already credited");

    if(tx.status !== "pending") return toast("Payment not confirmed yet");

    /* CREDIT SAFE */
    await db.ref("users/"+user.uid+"/balance").transaction(b=>{
        return (b||0) + tx.coins;
    });

    await db.ref("users/"+user.uid+"/transactions").push({
        type:"deposit",
        coins:tx.coins,
        amount:tx.amount,
        time:Date.now()
    });

    await txRef.update({status:"done"});

    toast("✅ Payment Verified & Coins Added");

    setTimeout(()=>{
        window.location.href="maining.html";
    },1500);
};
});

/* ================= CLICK DEPOSIT ================= */
document.getElementById("submitDepositBtn").onclick = async ()=>{

const user = firebase.auth().currentUser;
if(!user) return;

let amount = Number(document.getElementById("depositAmount").value);

if(!validate(amount)){
    return toast("Invalid amount");
}

let txId = generateTxId();
currentTxId = txId;

/* SAVE TRANSACTION */
await db.ref("transactions/"+txId).set({
    uid:user.uid,
    amount:amount,
    coins:amount/200,
    status:"pending",
    time:Date.now()
});

/* SHOW VERIFY BUTTON */
document.getElementById("verifyBtn").style.display = "block";

/* REDIRECT TO SELAR */
let selar = "https://selar.com/wz7sf30yxy";
window.location.href = selar + "?tx=" + txId;
};
</script>

</body>
</html>
