<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deposit Coins - Dark Magic Ai Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body { background:black; color:white; text-align:center; padding:20px; }
input, button { width:90%; padding:12px; margin-top:10px; border-radius:8px; }
button { background:red; color:white; }
</style>
</head>

<body>

<h2>Deposit</h2>

<input type="number" id="amount" placeholder="Enter amount ₦">
<input type="text" id="name" placeholder="Your Bank Name">
<input type="file" id="pdfFile" accept="application/pdf">

<button id="submit">Verify & Deposit</button>

<p id="status"></p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
  authDomain: "bets-d795d.firebaseapp.com",
  databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let paymentDetails = {};
db.ref("admin/paymentDetails").on("value", snap=>{
  paymentDetails = snap.val() || {};
});

function formatAmount(num){
  return "#" + num.toLocaleString() + ".00";
}

function extract(text, keyword){
  const i = text.toLowerCase().indexOf(keyword.toLowerCase());
  if(i === -1) return "";
  return text.substring(i, i+60);
}

async function readPDF(file){
  const reader = new FileReader();
  return new Promise(resolve=>{
    reader.onload = async function(){
      const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
      let text = "";

      for(let i=1;i<=pdf.numPages;i++){
        const page = await pdf.getPage(i);
        const viewport = page.getViewport({scale:2});
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({canvasContext:ctx, viewport}).promise;

        const img = canvas.toDataURL();
        const result = await Tesseract.recognize(img,'eng');
        text += result.data.text + "\n";
      }

      resolve(text);
    };
    reader.readAsArrayBuffer(file);
  });
}

function nameMatch(a,b){
  a = a.toLowerCase();
  b = b.toLowerCase();
  return a.includes(b) || b.includes(a);
}

document.getElementById("submit").onclick = async ()=>{
  const amount = Number(document.getElementById("amount").value);
  const name = document.getElementById("name").value.trim();
  const file = document.getElementById("pdfFile").files[0];
  const status = document.getElementById("status");

  if(!amount || !name || !file) return status.innerText="Fill all fields";

  status.innerText="Reading PDF...";

  const text = await readPDF(file);

  console.log(text);

  // ================== CHECK 1: AMOUNT ==================
  const formattedAmount = formatAmount(amount);
  if(!text.includes(formattedAmount)){
    return status.innerText="❌ Amount mismatch";
  }

  // ================== CHECK 2: RECIPIENT ==================
  if(!nameMatch(text, paymentDetails.accountName)){
    return status.innerText="❌ Recipient mismatch";
  }

  // ================== CHECK 3: SENDER ==================
  if(!nameMatch(text, name)){
    return status.innerText="❌ Sender name mismatch";
  }

  // ================== CHECK 4: TIME ==================
  const now = new Date();
  const currentDay = now.getDate();

  if(!text.includes(currentDay)){
    return status.innerText="❌ Invalid / Old receipt";
  }

  // ================== CHECK 5: PREVENT REUSE ==================
  const hash = btoa(text).substring(0,50);

  const usedSnap = await db.ref("usedReceipts/"+hash).once("value");
  if(usedSnap.exists()){
    return status.innerText="❌ Receipt already used";
  }

  // SAVE USED
  await db.ref("usedReceipts/"+hash).set(true);

  // ================== ADD BALANCE ==================
  const user = firebase.auth().currentUser;
  const userRef = db.ref("users/"+user.uid);

  const snap = await userRef.child("balance").once("value");
  let bal = snap.val() || 0;

  const coins = amount / 200;
  bal += coins;

  await userRef.update({balance:bal});

  status.innerText="✅ Success! Redirecting...";

  setTimeout(()=>{
    window.location.href="maining.html";
  },2000);
};
</script>

</body>
</html>
