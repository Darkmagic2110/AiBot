<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<!-- ADDED FOR PDF OCR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"], input[type="file"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    color: #000;
}
input::placeholder {
    color: #888;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: 0.3s ease-in-out;
    box-shadow: 0 0 18px rgba(255, 0, 0, 0.7);
}
button:hover {
    box-shadow: 0 0 25px rgba(255, 0, 0, 1);
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    font-family: 'Poppins', sans-serif;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 18px;
    z-index: 99999;
    opacity: 0;
    transition: opacity 0.3s, bottom 0.3s;
}
#toast.show {
    visibility: visible;
    opacity: 1;
    bottom: 50px;
}
#depositStatus {
    margin-top: 15px;
    font-size: 18px;
    color: yellow;
}
#paymentInstruction {
    margin-top: 15px;
    font-size: 18px;
    color: cyan;
    font-weight: bold;
}
#coinRate {
    font-size: 16px;
    color: cyan;
    margin-top: 5px;
}
#refreshNotice {
    font-size: 14px;
    color: yellow;
    margin-top: 12px;
    font-weight: bold;
    animation: blinkGlow 1s infinite alternate;
}
#pdfLoader{
    display:none;
    color:yellow;
    margin-top:10px;
}
#pdfResult{
    margin-top:10px;
    color:cyan;
}
</style>
</head>
<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />

<div style="color: yellow; font-size: 14px; margin-top: 10px;">
    This name must match your bank account name
</div>

<input type="text" id="accountName" placeholder="Enter your bank account name (e.g., John Joe)" />

<div id="coinRate">₦200 = 1 coin</div>

<button id="submitDepositBtn">💰 Pay Now</button>

<div id="depositStatus"></div>
<div id="paymentInstruction"></div>

<!-- ADDED PDF INPUT -->
<input type="file" id="pdfFile" accept="application/pdf">
<button onclick="verifyPDF()">Verify Payment</button>

<div id="pdfLoader">⏳ Verifying payment...</div>
<div id="pdfResult"></div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvFDByPPo9zgwKLdPaREz1OVMQCXmPfrs",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let paymentDetails = {};
db.ref("admin/paymentDetails").on("value", snap=>{
 if(snap.exists()) paymentDetails = snap.val();
});

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
}

document.getElementById("submitDepositBtn").onclick = ()=>{
 document.getElementById("paymentInstruction").innerHTML =
 "Account Number: "+paymentDetails.accountNumber+"<br>"+
 "Bank: "+paymentDetails.bankName+"<br>"+
 "Name: "+paymentDetails.accountName;
};

async function verifyPDF(){
 const file = document.getElementById("pdfFile").files[0];
 const amountInput = Number(document.getElementById("depositAmount").value);
 const userName = document.getElementById("accountName").value.toLowerCase();

 if(!file) return toast("Upload PDF");

 document.getElementById("pdfLoader").style.display="block";
 document.getElementById("pdfResult").innerHTML="";

 const reader = new FileReader();
 reader.onload = async function(){
  const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
  let text="";

  for(let i=1;i<=pdf.numPages;i++){
   const page = await pdf.getPage(i);
   const viewport = page.getViewport({scale:2});
   const canvas = document.createElement("canvas");
   const ctx = canvas.getContext("2d");
   canvas.width=viewport.width;
   canvas.height=viewport.height;

   await page.render({canvasContext:ctx,viewport}).promise;

   const img = canvas.toDataURL();
   const res = await Tesseract.recognize(img,'eng');
   text += res.data.text.toLowerCase();
  }

  let errors=[];

  if(!text.includes(amountInput.toString())) errors.push("❌ Amount mismatch");
  if(!text.includes(userName)) errors.push("❌ Name mismatch");
  if(!text.includes((paymentDetails.accountName||"").toLowerCase()))
    errors.push("❌ Recipient mismatch");

  document.getElementById("pdfLoader").style.display="none";

  if(errors.length){
    document.getElementById("pdfResult").innerHTML = errors.join("<br>");
    return;
  }

  const coins = amountInput / 200;
  const user = firebase.auth().currentUser;

  db.ref("users/"+user.uid+"/balance").once("value").then(s=>{
    let bal = s.val() || 0;
    db.ref("users/"+user.uid).update({
      balance: bal + coins
    });
  });

  db.ref("users/"+user.uid+"/transactions").push({
    type:"deposit",
    amount:amountInput,
    coins:coins,
    status:"approved",
    time:Date.now()
  });

  document.getElementById("pdfResult").innerHTML="✅ Payment Verified! Coins Added!";
 };

 reader.readAsArrayBuffer(file);
}
</script>

</body>
</html>
