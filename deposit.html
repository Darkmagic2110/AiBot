<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PDF OCR Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<!-- Tesseract OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: #fff;
  padding: 20px;
}

input {
  margin-bottom: 20px;
}

#output {
  white-space: pre-wrap;
  background: #000;
  padding: 15px;
  border-radius: 10px;
  max-height: 400px;
  overflow-y: auto;
}

canvas {
  display: none;
}
</style>
</head>
<body>

<h2>Upload Bank PDF (Image-based)</h2>
<input type="file" id="pdfInput" accept="application/pdf">

<p id="status">Status: Waiting...</p>

<div id="output"></div>

<script>
const pdfInput = document.getElementById("pdfInput");
const output = document.getElementById("output");
const statusText = document.getElementById("status");

pdfInput.addEventListener("change", async function() {
  const file = pdfInput.files[0];
  if (!file) return;

  statusText.innerText = "Loading PDF...";
  output.innerText = "";

  const fileReader = new FileReader();
  fileReader.onload = async function() {
    const typedarray = new Uint8Array(this.result);

    const pdf = await pdfjsLib.getDocument(typedarray).promise;
    let fullText = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      statusText.innerText = "Processing page " + i + " of " + pdf.numPages;

      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 2 });

      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: context,
        viewport: viewport
      }).promise;

      // Convert canvas to image for OCR
      const imageData = canvas.toDataURL("image/png");

      const result = await Tesseract.recognize(
        imageData,
        'eng',
        {
          logger: m => console.log(m)
        }
      );

      fullText += "\n\n--- Page " + i + " ---\n";
      fullText += result.data.text;
    }

    statusText.innerText = "✅ Done!";
    output.innerText = fullText;
  };

  fileReader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
