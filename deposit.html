<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Deposit Coins - Dark Magic Ai Bot</title>

<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">

<style>
body {
    background: black;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 10px;
}
h1 {
    font-family: 'UnifrakturCook', cursive;
    font-size: 35px;
    color: red;
    margin-bottom: 5px;
}
input[type="number"], input[type="text"] {
    width: 90%;
    padding: 12px;
    font-size: 18px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button {
    width: 92%;
    padding: 14px;
    background: #e60000;
    font-family: 'Poppins', sans-serif;
    font-size: 18px;
    color: #ffffff;
    font-weight: 600;
    border-radius: 10px;
    border: none;
    margin-top: 12px;
    cursor: pointer;
}
#toast {
    visibility: hidden;
    min-width: 240px;
    background-color: red;
    color: black;
    text-align: center;
    border-radius: 10px;
    padding: 12px;
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
}
#toast.show {
    visibility: visible;
}
#depositStatus {
    margin-top: 15px;
    color: yellow;
}
</style>
</head>

<body>

<h1>Deposit Coins</h1>

<input type="number" id="depositAmount" placeholder="Enter deposit amount (₦)" min="1000" />
<div id="coinRate">₦200 = 1 coin</div>
<button id="submitDepositBtn">💰 Buy Coins</button>

<div id="depositStatus"></div>

<div id="historyBox">
    <h3>📜 Transactions</h3>
    <div id="historyList"></div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://checkout.flutterwave.com/v3.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "bets-d795d.firebaseapp.com",
    databaseURL: "https://bets-d795d-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const depositStatus = document.getElementById("depositStatus");
const submitBtn = document.getElementById("submitDepositBtn");
const depositInput = document.getElementById("depositAmount");
const historyList = document.getElementById("historyList");

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerHTML = msg;
    t.className = "show";
    setTimeout(() => { t.className = t.className.replace("show", ""); }, 3000);
}

/* =========================
   AUTH + HISTORY (UNCHANGED)
========================= */
firebase.auth().onAuthStateChanged(user => {
    if (!user) {
        window.location.href = "login.html";
        return;
    }

    // Load history
    db.ref("users/" + user.uid + "/transactions").once("value").then(snap => {
        historyList.innerHTML = "";
        let arr = [];

        snap.forEach(child => {
            let tx = child.val();
            tx.key = child.key;
            arr.push(tx);
        });

        arr.sort((a,b)=> b.time - a.time);

        arr.forEach(tx => {
            if(tx.type === "deposit"){
                const d = new Date(tx.time).toLocaleString();

                historyList.innerHTML += `
                <div>
                    +${tx.coins} Coins - ₦${tx.amount} <br>
                    Ref: ${tx.ref} <br>
                    ${d}
                </div><hr>`;
            }
        });
    });

    /* =========================
       ✅ HANDLE REDIRECT RESULT
    ========================= */
    const params = new URLSearchParams(window.location.search);
    const status = params.get("status");
    const txId = params.get("transaction_id");

    if(status === "successful" && txId){

        const userRef = db.ref("users/" + user.uid);

        userRef.child("transactions")
        .orderByChild("ref")
        .equalTo(txId)
        .once("value")
        .then(snap => {

            if(snap.exists()){
                window.location.href = "maining.html";
                return;
            }

            let amountRaw = localStorage.getItem("fw_amount");
            if(!amountRaw) return;

            amountRaw = Number(amountRaw);
            const coins = amountRaw / 200;

            userRef.child("balance").once("value").then(snap => {
                let current = snap.val() || 0;
                userRef.child("balance").set(current + coins);
            });

            userRef.child("transactions").push({
                type: "deposit",
                coins: coins,
                amount: amountRaw,
                ref: txId,
                time: Date.now()
            });

            localStorage.removeItem("fw_amount");

            toast("Payment successful, coins added!");

            setTimeout(()=>{
                window.location.href = "maining.html";
            },1500);
        });
    }
});

/* =========================
   PAYMENT KEY
========================= */
let flutterPublicKey = null;
db.ref("settings/paystackKeys/public").once("value").then(snap => {
    flutterPublicKey = snap.val() || "";
});

/* =========================
   VALIDATION (UNCHANGED)
========================= */
function validateAmount(amount) {
    const min = 1000;
    const rate = 200;
    if (amount < min) return { valid: false, msg: `Minimum deposit is ₦${min}` };
    if (amount % rate !== 0) {
        return { valid: false, msg: `Enter multiple of ₦${rate}` };
    }
    return { valid: true, coins: amount / rate };
}

/* =========================
   PAYMENT BUTTON (UPDATED)
========================= */
submitBtn.onclick = () => {
    const user = firebase.auth().currentUser;
    if (!user) return toast("Please login again");

    const amountRaw = Number(depositInput.value);
    if (!amountRaw) return toast("Enter amount");

    const validation = validateAmount(amountRaw);
    if (!validation.valid) return toast(validation.msg);

    const coins = validation.coins;
    depositStatus.innerHTML = `You will receive ${coins} coin(s)`;

    // ✅ store amount for redirect
    localStorage.setItem("fw_amount", amountRaw);

    FlutterwaveCheckout({
        public_key: flutterPublicKey,
        tx_ref: "TX-" + Date.now(),
        amount: amountRaw,
        currency: "NGN",
        customer: {
            email: user.email
        },

        // ✅ redirect back to same page
        redirect_url: window.location.href,

        callback: function(response){
            console.log("Payment:", response);
        },

        onclose: function(){
            toast("Payment cancelled");
        }
    });
};
</script>

</body>
</html>
